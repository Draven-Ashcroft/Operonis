<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E. coli — lac Operon</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:      #000000;
    --label:      rgba(200, 230, 220, 0.45);
    --label-dim:  rgba(200, 230, 220, 0.22);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--label);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* ═══════════════════════════════════════════════════
     ROOT LAYOUT
     3-column: left-strip | center-dish | right-card
  ═══════════════════════════════════════════════════ */
  body {
    display: grid;
    grid-template-columns:
      64px                         /* left control strip */
      1fr                          /* center dish card — takes remaining space */
      clamp(210px, 23vw, 280px);   /* right calling card */
    grid-template-rows: 100vh;
    grid-template-areas: "strip center card";
    align-items: center;
    gap: clamp(8px, 1.2vw, 16px);
    padding: clamp(8px, 1.2vh, 14px) clamp(8px, 1.2vw, 14px);
    box-sizing: border-box;
    overflow: hidden;
  }

  /* ── Left control strip ── */
  .left-strip {
    grid-area: strip;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: clamp(12px, 2vh, 24px);
    gap: 0;
    background: rgba(8,12,16,0.90);
    border: 1px solid rgba(200,220,240,0.08);
    border-radius: 12px;
    height: calc(100vh - clamp(16px, 2.4vh, 28px));
    box-sizing: border-box;
    box-shadow: 0 4px 24px rgba(0,0,0,0.50);
  }

  /* ── Center dish card ── */
  .center-card {
    grid-area: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;   /* dish top, narrative bottom */
    gap: 0;
    background: rgba(6,10,14,0.92);
    border: 1px solid rgba(200,220,240,0.08);
    border-radius: 14px;
    height: calc(100vh - clamp(16px, 2.4vh, 28px));
    box-sizing: border-box;
    padding: clamp(8px, 1.2vh, 14px) clamp(8px, 1.2vh, 14px) 0;
    box-shadow: 0 4px 32px rgba(0,0,0,0.50);
    overflow: hidden;
  }

  /* ── Right calling card panel ── */
  .card-panel {
    grid-area: card;
    height: calc(100vh - clamp(16px, 2.4vh, 28px));
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ── Mobile layout handled in the media query below ── */

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 54%,
      rgba(60, 30, 0, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Top label ── */
  .specimen-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .specimen-label .eyebrow {
    font-size: clamp(9px, 1.1vw, 11px);
    color: var(--label-dim);
  }
  .specimen-label .name {
    font-size: clamp(13px, 1.7vw, 17px);
    color: var(--label);
    font-style: italic;
    letter-spacing: 0.18em;
  }

  /* ── Petri dish wrapper — fills center card ── */
  .dish-wrap {
    position: relative;
    overflow: hidden;          /* clip zoomed bacterium at dish boundary */
    border-radius: 50%;        /* match dish circle */
    /* Drive by vh so it fits the center card height comfortably.
       Subtract room for sliders (~60px) and label (~30px).
       Cap at 72vh to never overflow. */
    width:  min(calc(100vh - 64px), calc(100% - 16px), 82vh);
    height: min(calc(100vh - 64px), calc(100% - 16px), 82vh);
    flex-shrink: 0;
  }

  
  .dish-svg { width: 100%; height: 100%; overflow: visible; }

  /* ── Bacterium container ── */
  .bact-layer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52%; height: 52%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bact-svg {
    width: 100%; height: 100%;
    overflow: visible;
    animation: idle-tumble 9s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes idle-tumble {
    0%   { transform: rotate(0deg)     translateY(0px);  }
    25%  { transform: rotate(0.5deg)   translateY(-1.5px); }
    50%  { transform: rotate(0deg)     translateY(-2px); }
    75%  { transform: rotate(-0.5deg)  translateY(-1.5px); }
    100% { transform: rotate(0deg)     translateY(0px);  }
  }

  .flagella {
    animation: flagella-wave 3.2s ease-in-out infinite;
    transform-origin: 18% 50%;
  }
  @keyframes flagella-wave {
    0%   { transform: scaleY(1)    rotate(0deg);   }
    30%  { transform: scaleY(1.08) rotate(1.5deg); }
    60%  { transform: scaleY(0.94) rotate(-2deg);  }
    100% { transform: scaleY(1)    rotate(0deg);   }
  }
  .flagella-b {
    animation: flagella-wave-b 3.8s ease-in-out infinite;
    transform-origin: 82% 50%;
  }
  @keyframes flagella-wave-b {
    0%   { transform: scaleY(1)    rotate(0deg);    }
    40%  { transform: scaleY(0.92) rotate(-1.8deg); }
    70%  { transform: scaleY(1.06) rotate(1.2deg);  }
    100% { transform: scaleY(1)    rotate(0deg);    }
  }
  .bact-glow-el { animation: glow-pulse 4s ease-in-out infinite; }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.35; }
    50%       { opacity: 0.55; }
  }

  /* ── Scan line ── */
  .dish-wrap::after {
    content: '';
    position: absolute;
    left: 5%; right: 5%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,220,230,0.05), transparent);
    top: 50%;
    animation: scan 7s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { top: 10%; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 90%; opacity: 0; }
  }

  /* ── Bottom metadata strip ── */
  /* Meta strip — hidden on desktop (no room), visible on mobile */
  .meta {
    display: none;
  }
   /* close @media mobile meta */

  /* ══════════════════════════════════════
     CONDITION CONTROL BUTTONS
  ══════════════════════════════════════ */
  /* Controls now vertical inside left strip */
  .controls {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 1.5vh, 18px);
    align-items: center;
    width: 100%;
    padding: 0 0 clamp(8px,1.2vh,14px) 0;
  }
  .ctrl-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
  .ctrl-btn {
    width: clamp(26px, 3.6vh, 38px);
    height: clamp(26px, 3.6vh, 38px);
    border-radius: 50%; border: none; cursor: pointer;
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.22s ease, opacity 0.18s ease;
    outline: none; background-clip: padding-box;
  }
  .ctrl-btn::before {
    content: ''; position: absolute; inset: -2px; border-radius: 50%;
    border: 1.5px solid transparent;
    transition: border-color 0.22s ease, box-shadow 0.22s ease;
  }
  .ctrl-btn.static   { background: radial-gradient(circle at 38% 35%, #ffffff, #b0b8b4); }
  .ctrl-btn.glucose  { background: radial-gradient(circle at 38% 35%, #52ff88, #1a8c44); }
  .ctrl-btn.lactose  { background: radial-gradient(circle at 38% 35%, #c880ff, #6a1ab0); }


  .ctrl-btn:hover { transform: scale(1.12); opacity: 1; }
  .ctrl-btn.static:hover   { box-shadow: 0 0 14px 4px rgba(220,240,235,0.30); }
  .ctrl-btn.glucose:hover  { box-shadow: 0 0 14px 4px rgba(60,200,100,0.35); }
  .ctrl-btn.lactose:hover  { box-shadow: 0 0 14px 4px rgba(170,80,255,0.35); }


  .ctrl-btn.active { transform: scale(1.06); }
  .ctrl-btn.static.active::before   { border-color: rgba(220,240,235,0.55); box-shadow: 0 0 0 3px rgba(220,240,235,0.12); }
  .ctrl-btn.glucose.active::before  { border-color: rgba(60,220,110,0.65);  box-shadow: 0 0 0 3px rgba(60,220,110,0.14); }
  .ctrl-btn.lactose.active::before  { border-color: rgba(180,90,255,0.65);  box-shadow: 0 0 0 3px rgba(180,90,255,0.14); }

  .ctrl-btn.static.active   { box-shadow: 0 0 22px 7px rgba(220,240,235,0.22); }
  .ctrl-btn.glucose.active  { box-shadow: 0 0 22px 7px rgba(60,220,110,0.26); }
  .ctrl-btn.lactose.active  { box-shadow: 0 0 22px 7px rgba(180,90,255,0.26); }

  .ctrl-btn.inactive { opacity: 0.38; transform: scale(0.94); }

  .ctrl-btn-label {
    font-size: clamp(7px, 0.85vw, 9px); letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(200, 230, 220, 0.60);
    transition: color 0.22s ease; text-align: center; white-space: nowrap;
  }
  .ctrl-btn-wrap.active-wrap .ctrl-btn-label { color: rgba(200, 230, 220, 0.95); }

  /* ── Phase 2 function dot buttons ── */
  .p2-controls {
    display: none;
    flex-direction: column;
    gap: clamp(10px, 1.5vh, 18px);
    align-items: center;
    width: 100%;
    padding: 0 0 clamp(8px,1.2vh,14px) 0;
  }
  .p2-controls.visible { display: flex; }

  .p2-btn-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px; cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .p2-btn {
    width: clamp(26px, 3.6vh, 38px);
    height: clamp(26px, 3.6vh, 38px);
    border-radius: 50%; border: none; cursor: pointer;
    position: relative; outline: none;
    transition: transform 0.18s ease, box-shadow 0.22s ease, opacity 0.18s ease;
    background-clip: padding-box;
  }
  .p2-btn::before {
    content: ''; position: absolute; inset: -2px; border-radius: 50%;
    border: 1.5px solid transparent;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }
  /* Individual dot colors */
  .p2-btn.bgal      { background: radial-gradient(circle at 38% 35%, #cc88ff, #7722cc); }
  .p2-btn.allolac   { background: radial-gradient(circle at 38% 35%, #44ffaa, #00884a); }
  .p2-btn.lacy      { background: radial-gradient(circle at 38% 35%, #44ddff, #0077aa); }
  .p2-btn.laca      { background: radial-gradient(circle at 38% 35%, #ff66cc, #aa0066); }

  .p2-btn:hover { transform: scale(1.12); }
  .p2-btn.bgal:hover    { box-shadow: 0 0 14px 4px rgba(180,100,255,0.40); }
  .p2-btn.allolac:hover { box-shadow: 0 0 14px 4px rgba(60,220,150,0.40); }
  .p2-btn.lacy:hover    { box-shadow: 0 0 14px 4px rgba(60,200,255,0.40); }
  .p2-btn.laca:hover    { box-shadow: 0 0 14px 4px rgba(255,80,180,0.40); }

  /* Flash active state when triggered */
  .p2-btn.firing { transform: scale(1.06); }
  .p2-btn.bgal.firing::before    { border-color: rgba(180,100,255,0.70); box-shadow: 0 0 0 3px rgba(180,100,255,0.20); }
  .p2-btn.allolac.firing::before { border-color: rgba(60,220,150,0.70);  box-shadow: 0 0 0 3px rgba(60,220,150,0.20); }
  .p2-btn.lacy.firing::before    { border-color: rgba(60,200,255,0.70);  box-shadow: 0 0 0 3px rgba(60,200,255,0.20); }
  .p2-btn.laca.firing::before    { border-color: rgba(255,80,180,0.70);  box-shadow: 0 0 0 3px rgba(255,80,180,0.20); }

  .p2-btn.bgal.firing    { box-shadow: 0 0 22px 8px rgba(180,100,255,0.35); }
  .p2-btn.allolac.firing { box-shadow: 0 0 22px 8px rgba(60,220,150,0.35); }
  .p2-btn.lacy.firing    { box-shadow: 0 0 22px 8px rgba(60,200,255,0.35); }
  .p2-btn.laca.firing    { box-shadow: 0 0 22px 8px rgba(255,80,180,0.35); }

  .p2-btn-label {
    font-size: clamp(7px, 0.85vw, 9px); letter-spacing: 0.10em;
    text-transform: uppercase; color: rgba(200, 230, 220, 0.60);
    text-align: center; white-space: nowrap;
    transition: color 0.22s ease;
  }
  .p2-btn-wrap.firing-wrap .p2-btn-label { color: rgba(200, 230, 220, 0.95); }

  .p2-btn-wrap.unlocked {
    opacity: 1;
    pointer-events: all;
  }

  /* Phase nav arrows */
  .phase-nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: clamp(10px,1.4vh,16px) 0;
    width: 100%;
    border-top: 1px solid rgba(200,220,240,0.12);
    margin-top: auto;
  }

  /* Phase label — clearly readable */
  .phase-indicator {
    font-size: clamp(8px, 0.9vw, 10px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(200,230,220,0.75);
    text-align: center;
    font-family: 'Courier New', monospace;
    font-weight: 600;
    line-height: 1.3;
  }

  /* Material rounded arrow buttons */
  .phase-arrow {
    width: clamp(30px, 4vh, 40px);
    height: clamp(30px, 4vh, 40px);
    border-radius: 50%;
    border: none;
    background: rgba(200,220,240,0.12);
    color: rgba(200,230,220,0.90);
    font-size: clamp(16px, 2.2vh, 22px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    outline: none;
    line-height: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.40),
                inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .phase-arrow:hover:not(:disabled) {
    background: rgba(200,220,240,0.22);
    transform: scale(1.08);
    box-shadow: 0 2px 10px rgba(0,229,160,0.18),
                inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .phase-arrow:active:not(:disabled) { transform: scale(0.94); }
  .phase-arrow:disabled {
    opacity: 0.18;
    cursor: default;
    box-shadow: none;
  }

  /* Reset button — matches step-btn design, sits beside zoom */
  .reset-btn {
    width: clamp(26px, 3.6vh, 38px);
    height: clamp(26px, 3.6vh, 38px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    outline: none;
    background-clip: padding-box;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(13px, 1.7vh, 18px);
    color: rgba(200,230,220,0.85);
    background: radial-gradient(circle at 38% 35%,
      rgba(200,220,230,0.22),
      rgba(80,100,110,0.35));
    transition: transform 0.15s ease, box-shadow 0.18s ease;
    font-family: 'Courier New', monospace;
  }
  .reset-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1.5px solid rgba(200,220,240,0.18);
    transition: border-color 0.18s ease;
  }
  .reset-btn:hover {
    transform: scale(1.10);
    box-shadow: 0 0 10px 3px rgba(200,220,240,0.22);
  }
  .reset-btn:hover::before { border-color: rgba(200,220,240,0.50); }
  .reset-btn:active { transform: scale(0.90); }

  /* Ribosome in bact2 */
  .bact2-ribosome { pointer-events: none; }

  /* Phase 1 clickable elements — pointer-events + hover indicator */
  .bact-svg g[id="promoter"],
  .bact-svg g[id="operator"],
  .bact-svg g[id="lacZ"],
  .bact-svg g[id="lacY"],
  .bact-svg g[id="lacA"],
  .bact-svg g[id="repressor"],
  .bact-svg g[id="rnaPolymerase"],
  .bact-svg g[id="betagal"],
  .bact-svg g[id="cap-site"] {
    pointer-events: all;
    cursor: pointer;
  }
  .bact-svg g[id="promoter"]:hover,
  .bact-svg g[id="operator"]:hover,
  .bact-svg g[id="lacZ"]:hover,
  .bact-svg g[id="lacY"]:hover,
  .bact-svg g[id="lacA"]:hover,
  .bact-svg g[id="repressor"]:hover,
  .bact-svg g[id="rnaPolymerase"]:hover,
  .bact-svg g[id="betagal"]:hover,
  .bact-svg g[id="cap-site"]:hover {
    filter: brightness(1.35);
    transition: filter 0.18s ease;
  }

  /* ── Speed / Zoom stepper buttons (in left strip) ── */
  .step-controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    padding: 10px 0;
    border-top: 1px solid rgba(200,220,240,0.08);
    border-bottom: 1px solid rgba(200,220,240,0.08);
  }
  .step-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .step-label {
    font-size: clamp(7px, 0.85vw, 9px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 230, 220, 0.60);
  }
  /* Step buttons match ctrl-btn design exactly */
  .step-btn {
    width: clamp(26px, 3.6vh, 38px);
    height: clamp(26px, 3.6vh, 38px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    outline: none;
    background-clip: padding-box;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(14px, 1.8vh, 20px);
    font-weight: 300;
    color: rgba(200,230,220,0.90);
    background: radial-gradient(circle at 38% 35%,
      rgba(200,220,230,0.22),
      rgba(80,100,110,0.35));
    transition: transform 0.15s ease, box-shadow 0.18s ease;
    font-family: 'Courier New', monospace;
  }
  .step-btn::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1.5px solid rgba(200,220,240,0.18);
    transition: border-color 0.18s ease;
  }
  .step-btn:hover {
    transform: scale(1.10);
    box-shadow: 0 0 10px 3px rgba(200,220,240,0.18);
  }
  .step-btn:hover::before { border-color: rgba(200,220,240,0.45); }
  .step-btn:active { transform: scale(0.94); }
  .step-value {
    font-size: clamp(8px, 0.9vw, 10px);
    color: var(--label);
    letter-spacing: 0.10em;
    text-align: center;
    font-family: 'Courier New', monospace;
  }

  /* ── Utility controls: speed + zoom ── */
  .util-controls {
    display: flex;
    gap: clamp(16px, 2.5vw, 32px);
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .util-group {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .util-label {
    font-size: clamp(7px, 0.85vw, 9px); letter-spacing: 0.20em;
    text-transform: uppercase; color: var(--label-dim);
  }
  .util-value {
    font-size: clamp(8px, 0.95vw, 10px); letter-spacing: 0.12em;
    color: var(--label); min-width: 28px; text-align: center;
  }
  /* Custom range slider */
  .util-slider {
    -webkit-appearance: none; appearance: none;
    width: clamp(80px, 10vw, 140px); height: 3px;
    background: rgba(200,230,220,0.15); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .util-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--label); cursor: pointer;
    box-shadow: 0 0 6px 2px rgba(200,230,220,0.20);
    transition: box-shadow 0.2s ease;
  }
  .util-slider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 10px 4px rgba(200,230,220,0.35);
  }
  .util-slider::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; border: none;
    background: var(--label); cursor: pointer;
  }
  .util-slider:focus::-webkit-slider-thumb {
    box-shadow: 0 0 0 3px rgba(0,229,160,0.25);
  }

  /* ══════════════════════════════════════
     PHASE 2 CALLING CARD — right panel
  ══════════════════════════════════════ */
  /* Thin scrollbar for calling card on all platforms */
  #calling-card::-webkit-scrollbar       { width: 3px; }
  #calling-card::-webkit-scrollbar-track { background: transparent; }
  #calling-card::-webkit-scrollbar-thumb {
    background: rgba(200,220,240,0.18);
    border-radius: 2px;
  }

  #calling-card {
    position: relative;
    width: 100%;
    max-height: 75vh;
    overflow-y: auto;
    background: rgba(8, 12, 18, 0.96);
    border: 1px solid rgba(200, 220, 240, 0.14);
    border-radius: 12px;
    padding: clamp(14px, 1.8vw, 20px);
    box-shadow: 0 4px 40px rgba(0,0,0,0.55),
                0 0 0 1px rgba(255,255,255,0.04),
                inset 0 1px 0 rgba(255,255,255,0.06);
    /* Fade in/out instead of slide — it's in-flow now */
    opacity: 0;
    transform: translateX(18px);
    transition: opacity 0.40s ease, transform 0.40s ease;
    pointer-events: none;
  }
  #calling-card.open {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
  }
  /* ── Simulation title ── */
  #sim-title {
    padding: clamp(10px, 1.5vh, 16px) clamp(12px, 1.5vw, 18px) clamp(8px, 1vh, 12px);
    border-bottom: 1px solid rgba(200,220,240,0.10);
    margin-bottom: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  /* DNA logo pill */
  #sim-logo-pill {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px 8px;
    border-radius: 8px;
    background: rgba(0,229,160,0.07);
    border: 1px solid rgba(0,229,160,0.22);
    box-shadow: 0 0 8px rgba(0,229,160,0.12),
                inset 0 1px 0 rgba(255,255,255,0.04);
    backdrop-filter: blur(4px);
  }
  #sim-logo {
    width: clamp(16px, 2vw, 22px);
    height: clamp(16px, 2vw, 22px);
    display: block;
    filter: drop-shadow(0 0 3px rgba(0,229,160,0.55));
  }
  #sim-title-text {
    font-family: 'Courier New', monospace;
    font-size: clamp(11px, 1.2vw, 14px);
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: rgba(200,235,225,0.88);
    font-weight: 600;
    text-shadow: 0 0 12px rgba(0,229,160,0.20);
  }

  /* Empty state — show placeholder when no card selected */
  #card-placeholder {
    width: 100%;
    border: 1px dashed rgba(200,220,240,0.10);
    border-radius: 12px;
    padding: clamp(16px, 2vh, 28px) clamp(12px, 1.5vw, 18px);
    text-align: center;
    color: rgba(200,220,240,0.22);
    font-size: clamp(9px, 0.9vw, 11px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    line-height: 1.8;
    display: block;
    box-sizing: border-box;
  }
  #card-placeholder.hidden { display: none; }

  

  /* Accent line — color changes per card */
  #calling-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
    background: var(--card-accent, rgba(180,100,255,0.80));
    transition: background 0.35s ease;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--card-accent, rgba(180,100,255,0.80));
    box-shadow: 0 0 8px 2px var(--card-accent, rgba(180,100,255,0.50));
    transition: background 0.35s ease, box-shadow 0.35s ease;
  }
  .card-title {
    font-size: clamp(10px, 1.2vw, 13px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--label);
    font-family: 'Courier New', monospace;
  }
  .card-subtitle {
    font-size: clamp(8px, 0.9vw, 10px);
    color: var(--label-dim);
    letter-spacing: 0.14em;
    margin-top: 2px;
  }
  .card-divider {
    height: 1px;
    background: rgba(200,220,240,0.10);
    margin-bottom: 14px;
  }

  /* Step list */
  .card-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    list-style: none;
    padding: 0; margin: 0;
  }
  .card-step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    opacity: 0.30;
    transition: opacity 0.40s ease;
  }
  .card-step.active {
    opacity: 1.0;
  }
  .card-step.done {
    opacity: 0.55;
  }
  .step-num {
    flex-shrink: 0;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(200,220,240,0.20);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    color: var(--label-dim);
    letter-spacing: 0;
    transition: border-color 0.35s ease, background 0.35s ease, color 0.35s ease;
    font-family: 'Courier New', monospace;
  }
  .card-step.active .step-num {
    background: var(--card-accent, rgba(180,100,255,0.80));
    border-color: transparent;
    color: #000;
    box-shadow: 0 0 6px 2px var(--card-accent, rgba(180,100,255,0.40));
  }
  .card-step.done .step-num {
    background: rgba(200,220,240,0.12);
    border-color: rgba(200,220,240,0.20);
  }
  .step-text {
    font-size: clamp(9px, 1.0vw, 11px);
    color: var(--label);
    line-height: 1.55;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .card-step.active .step-text { color: #fff; }



  /* ══════════════════════════════════════
     CORNER STATE INDICATOR
  ══════════════════════════════════════ */
  #state-indicator {
    position: fixed;
    top: clamp(12px, 2vw, 20px); right: clamp(12px, 2vw, 20px);
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 8px;
    border: 1px solid rgba(200,230,220,0.10); border-radius: 4px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    z-index: 10; transition: border-color 0.3s ease;
  }
  #state-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  #state-text { font-size: clamp(8px, 0.95vw, 10px); letter-spacing: 0.20em; text-transform: uppercase; color: var(--label); transition: color 0.3s ease; white-space: nowrap; }
  #state-sub  { font-size: clamp(7px, 0.8vw, 9px); letter-spacing: 0.15em; text-transform: uppercase; color: var(--label-dim); display: block; margin-top: 1px; }

  /* ── DNA base pair refinements — molecular zipper ── */
  .base-pair line {
    filter: none;
    transition: opacity 0.3s ease;
  }
  /* Hydrogen bond indicators at base pair midpoints */
  .h-bond {
    opacity: 0.45;
    transition: opacity 0.4s ease;
  }
  .h-bond-dot {
    fill: rgba(255,255,255,0.5);
  }
  /* Region-specific H-bond colors */
  .bp-promoter .h-bond-dot { fill: rgba(26, 240, 255, 0.55); }
  .bp-operator .h-bond-dot { fill: rgba(255, 34, 51, 0.55); }
  .bp-lacZ .h-bond-dot     { fill: rgba(119, 51, 238, 0.45); }
  .bp-lacY .h-bond-dot     { fill: rgba(51, 68, 238, 0.45); }
  .bp-lacA .h-bond-dot     { fill: rgba(204, 17, 187, 0.45); }

  /* Nucleotide widening — tooth bases wider near strand */
  .tooth-top, .tooth-bottom {
    opacity: 0.3;
    transition: opacity 0.3s ease;
  }

  /* ── REPRESSOR — orange tetrameric protein ── */
  #repressor {
    transition: transform 1.8s cubic-bezier(0.4,0,0.2,1), opacity 1.5s ease;
  }
  .repressor-subunit {
    transition: all 0.6s ease;
  }
  #repressor.detached {
    transform: translate(0, -28px);
    opacity: 0.12;
  }
  #repressor.attached {
    transform: translate(0, 0);
    opacity: 1;
  }
  #repressor.detached .repressor-pinch {
    opacity: 0;
    transition: opacity 1s ease;
  }

  /* ── RNA POLYMERASE — gold multi-subunit ── */
  #rnaPolymerase {
    transition: opacity 0.8s ease;
  }
  .rnap-body {
    transition: all 0.6s ease;
  }
  #rnaPolymerase.blocked .rnap-glow {
    opacity: 0.08;
  }
  #rnaPolymerase.active .rnap-glow {
    opacity: 0.35;
  }
  #rnaPolymerase.low-activity .rnap-glow {
    opacity: 0.12;
  }

  /* ── DNA region glow classes ── */
  .dna-region-active { filter: url(#dnaRegionGlow); }

  /* ══════════════════════════════════════
     ALLOLACTOSE PARTICLES
  ══════════════════════════════════════ */
  .allo-particle {
    transition: opacity 0.6s ease;
  }
  /* Particle float animation — each particle gets a unique CSS animation via JS inline style */
  @keyframes allo-float-1 {
    0%   { transform: translate(0px, 0px) scale(1);    }
    33%  { transform: translate(3px, -4px) scale(1.1); }
    66%  { transform: translate(-2px, -2px) scale(0.95);}
    100% { transform: translate(0px, 0px) scale(1);    }
  }
  @keyframes allo-float-2 {
    0%   { transform: translate(0px, 0px) scale(1);     }
    40%  { transform: translate(-4px, -3px) scale(1.05);}
    70%  { transform: translate(2px, -5px) scale(1.1);  }
    100% { transform: translate(0px, 0px) scale(1);     }
  }
  @keyframes allo-float-3 {
    0%   { transform: translate(0px, 0px) scale(1);    }
    50%  { transform: translate(4px, -6px) scale(0.9); }
    100% { transform: translate(0px, 0px) scale(1);    }
  }

  /* ══════════════════════════════════════
     REPRESSOR — INDUCTION TRANSITIONS
  ══════════════════════════════════════ */
  #repressor {
    /* transition handled by JS with Web Animations API for phased control */
  }
  /* Shape morph when allolactose bound — subunits splay outward */
  #repressor.allolactose-bound .repressor-subunit {
    transition: all 1.0s cubic-bezier(0.4,0,0.2,1);
  }
  #repressor.allolactose-bound .repressor-subunit:nth-child(1) {
    transform: translate(-2px, -2px) scale(1.05);
  }
  #repressor.allolactose-bound .repressor-subunit:nth-child(2) {
    transform: translate(2px, -2px) scale(1.05);
  }

  /* ══════════════════════════════════════
     OPERATOR — STATE GLOW
  ══════════════════════════════════════ */
  #operator {
    transition: filter 0.8s ease;
  }
  #operator.operator-free {
    filter: url(#operatorFreeGlow);
  }
  #operator.operator-blocked {
    filter: url(#operatorGlow);
  }

  /* ══════════════════════════════════════
     RNA POLYMERASE — ACTIVE STATE
  ══════════════════════════════════════ */
  #rnaPolymerase {
    transition: opacity 0.8s ease;
  }
  #rnaPolymerase.blocked .rnap-glow { opacity: 0.08; }
  #rnaPolymerase.active  .rnap-glow { opacity: 0.38; }
  #rnaPolymerase.low-activity .rnap-glow { opacity: 0.12; }

  /* Activation pulse ring — shown when polymerase goes active */
  .rnap-pulse-ring {
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #rnaPolymerase.active .rnap-pulse-ring {
    opacity: 1;
  }

  /* ══════════════════════════════════════
     STEP NARRATIVE — floating label
  ══════════════════════════════════════ */
  #step-narrative {
    position: relative;
    font-size: clamp(9px, 0.95vw, 11px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(200, 230, 220, 0.0);   /* starts transparent — JS fades in */
    white-space: nowrap;
    pointer-events: none;
    text-align: center;
    flex-shrink: 0;
    min-height: 32px;
    line-height: 32px;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    padding: 0 16px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.35);
    border-top: 1px solid rgba(200,220,240,0.10);
    /* Opacity transition — JS controls opacity not color */
    transition: opacity 0.45s ease;
    opacity: 0;
  }
  #step-narrative.visible {
    opacity: 0.60;      /* resting — always readable */
    color: rgba(200, 230, 220, 0.90);
  }
  #step-narrative.highlight {
    opacity: 1.0;       /* active event — full brightness */
    color: rgba(220, 255, 240, 1.0);
    text-shadow: 0 0 12px rgba(0, 229, 160, 0.35);
  }

  /* ══════════════════════════════════════
     TRANSCRIPTION ANIMATION
  ══════════════════════════════════════ */

  /* Gene region transcription glow filters are defined inline in SVG defs */

  /* mRNA strand — silver-white filament */
  .mrna-strand {
    stroke: rgba(230, 240, 255, 0.85);
    stroke-width: 1.4;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: url(#mrnaGlow);
  }

  /* Polymerase travelling group */
  #rnap-traveller {
    transition: none;
  }

  /* Gene active glow overlays */
  .gene-active-overlay {
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  /* ── Ribosome dots on mRNA — co-translational ── */
  .mrna-ribosome {
    pointer-events: none;
  }

  /* ── Basal leaky transcription — very faint mRNA flicker ── */
  /* Represents low-level read-through even when repressor is bound */
  #basal-mrna {
    stroke: rgba(200, 220, 255, 0.28);
    stroke-width: 1.0;
    fill: none;
    stroke-linecap: round;
    pointer-events: none;
  }
  @keyframes basal-flicker {
    0%   { opacity: 0; }
    3%   { opacity: 0.55; }
    18%  { opacity: 0.35; }
    28%  { opacity: 0; }
    100% { opacity: 0; }
  }
  #basal-mrna { animation: basal-flicker 14s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .bact-svg, .flagella, .flagella-b, .bact-glow-el, .dish-wrap::after { animation: none; }
    #dna-helix-group { animation: none !important; }
    .allo-particle { animation: none !important; }
  }

  /* ── Lactose import particles ── */
  .lac-import-dot {
    transition: opacity 0.5s ease;
  }

  /* ═══════════════════════════════════════════
     MOBILE LAYOUT — clean single column
  ═══════════════════════════════════════════ */
  @media (max-width: 699px) {

    html, body {
      height: auto;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Stack: controls top → dish → calling card */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }

    /* ── Petri dish card — full width ── */
    .center-card {
      grid-area: unset;
      width: 100%;
      height: auto;
      padding: 8px 8px 4px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: visible !important;   /* let bact2 render outside card bounds if needed */
    }
    .dish-wrap {
      width: min(88vw, 360px) !important;
      height: min(88vw, 360px) !important;
      overflow: visible !important;   /* prevent bact2 clip on phase transition */
    }
    /* Larger bact-layer — fills dish better on small screens */
    .bact-layer {
      width: 75% !important;
      height: 75% !important;
    }
    #step-narrative {
      font-size: 9px;
      min-height: 22px;
      line-height: 22px;
      width: 100%;
      text-align: center;
    }

    /* ── Controls strip — horizontal row at top ── */
    .left-strip {
      order: -1;          /* always first, above the dish */
      grid-area: unset;
      width: 100%;
      height: auto;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
    }
    .controls, .p2-controls {
      flex-direction: row;
      gap: 12px;
      padding: 0;
    }
    .step-controls {
      flex-direction: row;
      gap: 12px;
      border: none !important;
      padding: 0;
    }
    .step-row {
      flex-direction: row;
      align-items: center;
      gap: 5px;
    }
    .phase-nav {
      flex-direction: row;
      border: none;
      padding: 0;
      margin: 0;
    }

    /* ── Calling card — full width below dish ── */
    .card-panel {
      grid-area: unset;
      width: 100%;
      height: auto;
    }
    #calling-card {
      opacity: 1 !important;
      transform: none !important;
      pointer-events: all !important;
      max-height: none;
      height: auto;
      overflow: visible;
    }
    #card-placeholder { padding: 16px; }

    /* State indicator — smaller on mobile */
    #state-indicator {
      top: 8px;
      right: 8px;
      padding: 5px 8px;
      font-size: 8px;
    }
  }
</style>
</head>
<body>

<!-- ── Corner state indicator ── -->
<div id="state-indicator">
  <div id="state-dot"></div>
  <div>
    <span id="state-text">Static</span>
    <span id="state-sub">condition · v4.7</span>
  </div>
</div>

<!-- ── Step narrative ── -->
<!-- ════════════════════════════════════════════════════
     LEFT CONTROL STRIP
════════════════════════════════════════════════════ -->
<div class="left-strip" id="left-strip">

  <div class="controls" id="controls">

  <!-- Phase nav — bottom of strip -->

  </div>

</div><!-- /left-strip -->

<!-- ════════════════════════════════════════════════════
     CENTER DISH CARD
════════════════════════════════════════════════════ -->
<div class="center-card">
<div class="scene-wrap"><div class="scene">

  <div class="dish-wrap" id="dish-wrap">

    <!-- Glass petri dish SVG — clear borosilicate look -->
    <svg class="dish-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Almost-black interior — no green tint -->
        <radialGradient id="dishBase" cx="44%" cy="40%" r="56%">
          <stop offset="0%"   stop-color="#080c0b" stop-opacity="0.60"/>
          <stop offset="55%"  stop-color="#050808" stop-opacity="0.80"/>
          <stop offset="100%" stop-color="#020404" stop-opacity="0.95"/>
        </radialGradient>
        <!-- Glass rim — cool neutral, no green -->
        <radialGradient id="rimGrad" cx="50%" cy="50%" r="50%">
          <stop offset="86%"  stop-color="rgba(200,210,215,0)"/>
          <stop offset="92%"  stop-color="rgba(210,220,228,0.10)"/>
          <stop offset="96%"  stop-color="rgba(230,238,245,0.32)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
        </radialGradient>
        <!-- Very faint neutral sheen — no color tint -->
        <radialGradient id="glassSheen" cx="36%" cy="32%" r="60%">
          <stop offset="0%"   stop-color="rgba(200,215,225,0.025)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <!-- Specular highlight gradient — bright white arc top-left -->
        <linearGradient id="specularArc" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
          <stop offset="22%"  stop-color="rgba(255,255,255,0.0)"/>
          <stop offset="38%"  stop-color="rgba(255,255,255,0.22)"/>
          <stop offset="55%"  stop-color="rgba(255,255,255,0.14)"/>
          <stop offset="75%"  stop-color="rgba(255,255,255,0.03)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <!-- Secondary lower specular -->
        <linearGradient id="specularLow" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
          <stop offset="40%"  stop-color="rgba(255,255,255,0.055)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <filter id="rimGlow" x="-5%" y="-5%" width="110%" height="110%">
          <feDropShadow dx="0" dy="0" stdDeviation="8"
                        flood-color="rgba(180,200,220,0.12)"/>
        </filter>
        <filter id="glowBlur"><feGaussianBlur stdDeviation="5"/></filter>
      </defs>

      <!-- Outer soft halo — neutral cool white glow around rim -->
      <circle cx="200" cy="200" r="186"
              fill="none" stroke="rgba(200,215,230,0.07)" stroke-width="2"
              filter="url(#glowBlur)"/>

      <!-- Main dish interior — deep dark, no color -->
      <circle cx="200" cy="200" r="175"
              fill="url(#dishBase)" filter="url(#rimGlow)"/>

      <!-- Very faint neutral sheen across interior -->
      <circle cx="200" cy="200" r="175" fill="url(#glassSheen)"/>

      <!-- Glass rim stroke — cool silver-white -->
      <circle cx="200" cy="200" r="175"

            stroke="rgba(180,100,255,0.45)" stroke-width="0.9" stroke-linecap="round"/>
    </svg>
    </div>
    <span id="sim-title-text">Lac Operon Simulator</span>
  </div>

  <div id="card-placeholder">
    Click a function dot<br>in Phase 2 to see<br>step-by-step details
  </div>
  <div id="calling-card">
    <div class="card-header">
      <div class="card-dot" id="card-dot"></div>
      <div>
        <div class="card-title" id="card-title"></div>
        <div class="card-subtitle" id="card-subtitle"></div>
      </div>
    </div>
    <div class="card-divider"></div>
    <ol class="card-steps" id="card-steps"></ol>

  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // GLOBAL STATE
  // ═══════════════════════════════════════════════════════════
  const STATE = {
    condition: 'static',   // 'static' | 'glucose' | 'lactose'
    inductionPhase: 'idle', // 'idle' | 'particles-drifting' | 'bound' | 'releasing' | 'free'
    animTimers: [],          // active setTimeout IDs — cleared on state change
    speedMult: 0.2,          // animation speed multiplier — default 0.2× (slow for teaching)
  };

  // ── Speed helper — all durations divided by speedMult ──
  function spd(ms) { return ms / STATE.speedMult; }
  // ── Random duration helper: base + random portion, both speed-scaled ──
  function randSpd(base, jitter) { return spd(base) + Math.random() * spd(jitter); }


    // ── Condition metadata ──
  const CONDITION_META = {
    'static':   { label: 'Static',     dot: '#c8dfd6', glow: 'rgba(200,230,220,0.30)' },
    'glucose':  { label: 'Glucose',    dot: '#3edf78', glow: 'rgba(62,223,120,0.38)'  },
    'lactose':  { label: 'Lactose',    dot: '#b45fff', glow: 'rgba(180,95,255,0.38)'  },

  };

  // ── DOM refs ──
  const dotEl      = document.getElementById('state-dot');
  const stateText  = document.getElementById('state-text');
  const indicator  = document.getElementById('state-indicator');
  const narrative  = document.getElementById('step-narrative');
  // Make narrative visible on load
  if (narrative) {
    narrative.classList.add('visible');
    narrative.style.opacity = '0.60';
  }
  const wraps      = document.querySelectorAll('.ctrl-btn-wrap');

  // ── DNA/actor element refs ──
  const DNA = {
    helix:                document.getElementById('dna-helix-group'),
    backboneTop:          document.getElementById('dna-backbone-top'),
    backboneBottom:       document.getElementById('dna-backbone-bottom'),
    basePairs:            document.getElementById('dna-base-pairs'),
    promoter:             document.getElementById('promoter'),
    operator:             document.getElementById('operator'),
    lacZ:                 document.getElementById('lacZ'),
    lacY:                 document.getElementById('lacY'),
    lacA:                 document.getElementById('lacA'),
    rnaPolymerase:        document.getElementById('rnaPolymerase'),
    repressor:            document.getElementById('repressor'),
    allolactoseLayer:     document.getElementById('allolactoseLayer'),
    mrnaLayer:            document.getElementById('mrnaLayer'),
    transcriptionEffects: document.getElementById('transcriptionEffects'),
    bp: Array.from({ length: 20 }, (_, i) => document.getElementById(`bp-${i}`)),
  };

  const SVG_NS = 'http://www.w3.org/2000/svg';

  // ── Single canonical ease function used everywhere ──
  function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

  // ── Cached SVG root — queried once, reused everywhere ──
  const BACT_SVG = document.querySelector('.bact-svg');

  // rAF loops automatically suspend when the tab is hidden — no action needed.

  // ═══════════════════════════════════════════════════════════
  // SPEED + ZOOM STEPPER BUTTONS
  // ═══════════════════════════════════════════════════════════
  const speedVal  = document.getElementById('speed-val');
  const zoomVal   = document.getElementById('zoom-val');
  const bactLayer = document.querySelector('.bact-layer');

  const SPEED_STEPS = [0.1, 0.15, 0.2, 0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4];
  let speedIdx = 2; // 0.2× default — slow for teaching

  function applySpeed() {
    const v = SPEED_STEPS[speedIdx];
    STATE.speedMult = v;
    if (speedVal) speedVal.textContent = v + '×';
    const basal = document.getElementById('basal-mrna');
    if (basal) basal.style.animationDuration = (14 / v) + 's';
  }

  const ZOOM_STEPS = [0.6, 0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2];
  let zoomIdx = 4; // 1.4×

  function applyZoom(v) {
    const val = (v !== undefined) ? v : ZOOM_STEPS[zoomIdx];
    if (zoomVal) zoomVal.textContent = val.toFixed(1) + '×';
    if (bactLayer) {
      bactLayer.style.transform = `translate(-50%, -50%) scale(${val})`;
      bactLayer.style.transformOrigin = 'center center';
    }
  }

  document.getElementById('speed-down') && document.getElementById('speed-down').addEventListener('click', () => {
    if (speedIdx > 0) { speedIdx--; applySpeed(); }
  });
  document.getElementById('speed-up') && document.getElementById('speed-up').addEventListener('click', () => {
    if (speedIdx < SPEED_STEPS.length - 1) { speedIdx++; applySpeed(); }
  });
  document.getElementById('zoom-down') && document.getElementById('zoom-down').addEventListener('click', () => {
    if (zoomIdx > 0) { zoomIdx--; applyZoom(); }
  });
  document.getElementById('zoom-up') && document.getElementById('zoom-up').addEventListener('click', () => {
    if (zoomIdx < ZOOM_STEPS.length - 1) { zoomIdx++; applyZoom(); }
  });

  // Apply default zoom on load
  applyZoom();

  // ═══════════════════════════════════════════════════════════
  // NARRATIVE HELPER
  // ═══════════════════════════════════════════════════════════
  // ── Narrative priority queue ──
  // highlight=true messages are "important" — they block low-priority updates
  // for a minimum hold time so students can read them.
  let narrativeTimer   = null;
  let narrativeLocked  = false;  // true while an important message is protected
  let narrativeLockTimer = null;

  function showNarrative(msg, highlight = false, fromP2 = false) {
    if (!narrative) return;

    // Phase 1 background systems must not overwrite Phase 2 narrative
    if (currentPhase === 2 && !fromP2) return;

    // Same message already showing — just refresh timer, don't flicker
    if (narrative.textContent === msg) {
      if (highlight) narrative.classList.add('highlight');
      resetNarrativeTimer(highlight);
      return;
    }

    // Low-priority message: don't interrupt a locked important one
    if (!highlight && narrativeLocked) return;

    // Cancel any pending lock
    if (narrativeLockTimer) { clearTimeout(narrativeLockTimer); narrativeLockTimer = null; }

    // Swap text with quick fade
    narrative.style.transition = 'opacity 0.18s ease';
    narrative.style.opacity = '0';

    setTimeout(() => {
      narrative.textContent = msg;
      narrative.classList.add('visible');
      void narrative.offsetWidth;
      narrative.style.transition = 'opacity 0.35s ease';
      narrative.style.opacity = highlight ? '1' : '0.65';
      narrative.classList.toggle('highlight', highlight);

      // Lock important messages for minimum read time
      if (highlight) {
        narrativeLocked = true;
        const lockMs = Math.min(spd(3200), 8000);  // 3.2s readable hold, fits within 3500ms ribosome stagger
        narrativeLockTimer = setTimeout(() => {
          narrativeLocked = false;
          narrativeLockTimer = null;
        }, lockMs);
      }

      resetNarrativeTimer(highlight);
    }, 120);
  }

  // Dim narrative after linger period
  function resetNarrativeTimer(highlight) {
    if (narrativeTimer) clearTimeout(narrativeTimer);
    // Important: linger longer. Normal: linger shorter.
    const linger = highlight
      ? Math.min(spd(12000), 28000)  // important messages stay up to 28s
      : Math.min(spd(5000), 12000);  // normal messages dim after ~5s
    narrativeTimer = setTimeout(() => {
      if (narrative) {
        narrative.style.transition = 'opacity 1.0s ease';
        narrative.classList.remove('highlight');
        narrative.style.opacity = '0.38';
        narrativeLocked = false;
      }
    }, linger);
  }

  // ═══════════════════════════════════════════════════════════
  // TIMER HELPER — all timers registered so they can be cancelled
  // ═══════════════════════════════════════════════════════════
  function scheduleAfter(ms, fn) {
    const id = setTimeout(fn, ms);
    STATE.animTimers.push(id);
    return id;
  }
  function clearAllTimers() {
    STATE.animTimers.forEach(id => clearTimeout(id));
    STATE.animTimers = [];
    if (narrativeTimer)     { clearTimeout(narrativeTimer);     narrativeTimer = null; }
    if (narrativeLockTimer) { clearTimeout(narrativeLockTimer); narrativeLockTimer = null; }
  }

  // ═══════════════════════════════════════════════════════════
  // ALLOLACTOSE PARTICLE SYSTEM
  // ═══════════════════════════════════════════════════════════

  // Particle configuration — 5 allolactose molecules
  // They start scattered inside the cell and drift toward the repressor
  const PARTICLE_CONFIGS = [
    { id: 'allo-0', startX: 180, startY: 100, targetX: 97,  targetY: 78, delay: 0,    dur: 2.2 },
    { id: 'allo-1', startX: 210, startY: 68,  targetX: 93,  targetY: 72, delay: 200,  dur: 2.5 },
    { id: 'allo-2', startX: 155, startY: 106, targetX: 90,  targetY: 82, delay: 400,  dur: 2.0 },
    { id: 'allo-3', startX: 195, startY: 58,  targetX: 88,  targetY: 70, delay: 150,  dur: 2.6 },
    { id: 'allo-4', startX: 170, startY: 96,  targetX: 95,  targetY: 76, delay: 600,  dur: 2.3 },
  ];

  /**
   * Create one allolactose particle SVG group
   * Each particle = central blob + 2-3 smaller satellite atoms (like a sugar molecule)
   */
  function createAlloParticle(cfg) {
    const g = document.createElementNS(SVG_NS, 'g');
    g.id = cfg.id;
    g.setAttribute('class', 'allo-particle');
    g.setAttribute('transform', `translate(${cfg.startX}, ${cfg.startY})`);
    g.style.opacity = '0';

    // Outer glow halo
    const halo = document.createElementNS(SVG_NS, 'circle');
    halo.setAttribute('cx', '0'); halo.setAttribute('cy', '0'); halo.setAttribute('r', '4.5');
    halo.setAttribute('fill', '#33ff88'); halo.setAttribute('fill-opacity', '0.12');
    halo.setAttribute('filter', 'url(#alloGlow)');
    g.appendChild(halo);

    // Main body
    const body = document.createElementNS(SVG_NS, 'circle');
    body.setAttribute('cx', '0'); body.setAttribute('cy', '0'); body.setAttribute('r', '2.4');
    body.setAttribute('fill', '#22ee77'); body.setAttribute('fill-opacity', '0.90');
    body.setAttribute('filter', 'url(#alloGlow)');
    g.appendChild(body);

    // Satellite atom 1
    const s1 = document.createElementNS(SVG_NS, 'circle');
    s1.setAttribute('cx', '-2.6'); s1.setAttribute('cy', '-1.8'); s1.setAttribute('r', '1.2');
    s1.setAttribute('fill', '#55ffaa'); s1.setAttribute('fill-opacity', '0.85');
    g.appendChild(s1);

    // Satellite atom 2
    const s2 = document.createElementNS(SVG_NS, 'circle');
    s2.setAttribute('cx', '2.6'); s2.setAttribute('cy', '-1.5'); s2.setAttribute('r', '1.1');
    s2.setAttribute('fill', '#44eeaa'); s2.setAttribute('fill-opacity', '0.80');
    g.appendChild(s2);

    // Bond line between main and s1
    const b1 = document.createElementNS(SVG_NS, 'line');
    b1.setAttribute('x1', '-1.2'); b1.setAttribute('y1', '-0.8');
    b1.setAttribute('x2', '-2.2'); b1.setAttribute('y2', '-1.4');
    b1.setAttribute('stroke', '#44ffaa'); b1.setAttribute('stroke-width', '0.5');
    b1.setAttribute('stroke-opacity', '0.6');
    g.appendChild(b1);

    // Bond line between main and s2
    const b2 = document.createElementNS(SVG_NS, 'line');
    b2.setAttribute('x1', '1.2'); b2.setAttribute('y1', '-0.7');
    b2.setAttribute('x2', '2.2'); b2.setAttribute('y2', '-1.2');
    b2.setAttribute('stroke', '#44ffaa'); b2.setAttribute('stroke-width', '0.5');
    b2.setAttribute('stroke-opacity', '0.6');
    g.appendChild(b2);

    // Idle float animation (organic drift before induction)
    const floatAnims = ['allo-float-1', 'allo-float-2', 'allo-float-3'];
    const floatDurs  = [3.8, 4.4, 3.2];
    const fi = parseInt(cfg.id.slice(-1)) % 3;
    g.style.animation = `${floatAnims[fi]} ${floatDurs[fi]}s ease-in-out infinite`;
    g.style.transformOrigin = `${cfg.startX}px ${cfg.startY}px`;

    return g;
  }

  /**
   * Spawn all allolactose particles at their start positions, invisible
   */
  function spawnAlloParticles() {
    DNA.allolactoseLayer.innerHTML = '';
    PARTICLE_CONFIGS.forEach(cfg => {
      DNA.allolactoseLayer.appendChild(createAlloParticle(cfg));
    });
  }

  /**
   * Fade all particles in
   */
  function showAlloParticles() {
    PARTICLE_CONFIGS.forEach(cfg => {
      const el = document.getElementById(cfg.id);
      if (!el) return;
      scheduleAfter(spd(cfg.delay), () => {
        el.style.transition = 'opacity 0.7s ease';
        el.style.opacity = '1';
      });
    });
  }

  /**
   * Animate particles drifting toward the repressor (binding motion)
   * Uses Web Animations API for smooth path interpolation
   */
  function driftParticlesToRepressor(onComplete) {
    let completed = 0;
    PARTICLE_CONFIGS.forEach((cfg, i) => {
      const el = document.getElementById(cfg.id);
      if (!el) { completed++; if (completed === PARTICLE_CONFIGS.length && onComplete) onComplete(); return; }

      // Remove float animation for drift
      el.style.animation = 'none';

      const startMs = spd(cfg.delay * 0.5); // slightly compressed timing
      scheduleAfter(startMs, () => {
        // Smooth cubic path to repressor binding pocket
        const anim = el.animate([
          { transform: `translate(${cfg.startX}px, ${cfg.startY}px)`, opacity: 1 },
          { transform: `translate(${(cfg.startX + cfg.targetX) / 2 - 8}px, ${(cfg.startY + cfg.targetY) / 2 - 12}px)`, opacity: 1, offset: 0.45 },
          { transform: `translate(${cfg.targetX}px, ${cfg.targetY}px)`, opacity: 1 },
        ], {
          duration: spd(cfg.dur * 1000),
          easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
          fill: 'forwards',
        });

        anim.onfinish = () => {
          completed++;
          if (completed === PARTICLE_CONFIGS.length && onComplete) onComplete();
        };
      });
    });
  }

  /**
   * Fade particles out (allolactose leaves after repressor drifts away)
   */
  function fadeAlloParticles(delay = 0) {
    PARTICLE_CONFIGS.forEach(cfg => {
      const el = document.getElementById(cfg.id);
      if (!el) return;
      scheduleAfter(delay, () => {
        el.style.transition = 'opacity 1.2s ease';
        el.style.opacity = '0';
      });
    });
    scheduleAfter(delay + 1500, () => {
      DNA.allolactoseLayer.innerHTML = '';
    });
  }

  // ═══════════════════════════════════════════════════════════
  // REPRESSOR ANIMATION
  // ═══════════════════════════════════════════════════════════

  /**
   * Repressor binding — animate back down to operator
   */
  function bindRepressor(onComplete) {
    const rep = DNA.repressor;
    rep.style.animation = 'none';

    const anim = rep.animate([
      { transform: 'translate(0px, -32px)',   opacity: 0.12 },
      { transform: 'translate(2px, -12px)',   opacity: 0.5,  offset: 0.4 },
      { transform: 'translate(0px, 0px)',     opacity: 1   },
    ], {
      duration: spd(1600),
      easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)', // slight overshoot = biological snap
      fill: 'forwards',
    });
    rep.classList.remove('detached', 'allolactose-bound');
    rep.classList.add('attached');
    anim.onfinish = () => { if (onComplete) onComplete(); };
  }

  /**
   * Repressor shape change — allolactose bound, conformational shift
   * Subunits splay outward slightly
   */
  function morphRepressorBound() {
    const rep = DNA.repressor;
    rep.classList.add('allolactose-bound');
    // Animate individual subunit ellipses
    const subunits = rep.querySelectorAll('.repressor-subunit');
    const offsets = [[-2,-2],[2,-2],[-1.5,1],[1.5,1]];
    subunits.forEach((su, i) => {
      const off = offsets[i] || [0,0];
      su.animate([
        { transform: 'translate(0,0) scale(1)' },
        { transform: `translate(${off[0]}px, ${off[1]}px) scale(1.06)` },
      ], { duration: spd(900), easing: 'ease-out', fill: 'forwards' });
    });
  }

  /**
   * Repressor release — drift upward, fade out
   */
  function releaseRepressor(onComplete) {
    const rep = DNA.repressor;
    // Reset any subunit morphs first
    rep.querySelectorAll('.repressor-subunit').forEach(su => {
      su.getAnimations().forEach(a => a.cancel());
    });

    const anim = rep.animate([
      { transform: 'translate(0px, 0px)',    opacity: 1    },
      { transform: 'translate(-4px, -10px)', opacity: 0.7, offset: 0.3 },
      { transform: 'translate(2px, -22px)',  opacity: 0.4, offset: 0.65 },
      { transform: 'translate(0px, -32px)',  opacity: 0.12 },
    ], {
      duration: spd(1800),
      easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
      fill: 'forwards',
    });
    rep.classList.remove('attached', 'allolactose-bound');
    rep.classList.add('detached');

    // Allolactose stays BOUND to repressor — animate allo particles with it
    // They travel upward together, fading as the complex leaves the DNA
    PARTICLE_CONFIGS.forEach(cfg => {
      const el = document.getElementById(cfg.id);
      if (!el || el.style.opacity === '0') return;
      el.animate([
        { transform: `translate(${cfg.targetX}px, ${cfg.targetY}px)`, opacity: parseFloat(el.style.opacity) || 1 },
        { transform: `translate(${cfg.targetX - 4}px, ${cfg.targetY - 12}px)`, opacity: 0.6, offset: 0.35 },
        { transform: `translate(${cfg.targetX + 2}px, ${cfg.targetY - 26}px)`, opacity: 0.2 },
      ], { duration: spd(1800), easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' });
    });

    anim.onfinish = () => { if (onComplete) onComplete(); };
  }

  // ═══════════════════════════════════════════════════════════
  // OPERATOR STATE
  // ═══════════════════════════════════════════════════════════
  function setOperatorBlocked() {
    DNA.operator.classList.remove('operator-free');
    DNA.operator.classList.add('operator-blocked');
  }
  function setOperatorFree() {
    DNA.operator.classList.remove('operator-blocked');
    DNA.operator.classList.add('operator-free');
  }

  // ═══════════════════════════════════════════════════════════
  // RNA POLYMERASE STATE
  // ═══════════════════════════════════════════════════════════
  function setPolymeraseActive() {
    const rnaP = DNA.rnaPolymerase;
    rnaP.classList.remove('blocked', 'low-activity');
    rnaP.classList.add('active');
    rnaP.style.opacity = '1';
    rnaP.style.filter = 'url(#rnapActiveGlow)';
  }
  function setPolymeraseBlocked() {
    const rnaP = DNA.rnaPolymerase;
    rnaP.classList.remove('active', 'low-activity');
    rnaP.classList.add('blocked');
    rnaP.style.opacity = '1';
    rnaP.style.filter = 'none';
  }
  function setPolymeraseLow() {
    const rnaP = DNA.rnaPolymerase;
    rnaP.classList.remove('blocked', 'active');
    rnaP.classList.add('low-activity');
    rnaP.style.opacity = '0.55';
    rnaP.style.filter = 'none';
  }

  // ═══════════════════════════════════════════════════════════
  // RESET — snap everything back to baseline without animation
  // ═══════════════════════════════════════════════════════════
  function snapToBaseline() {
    clearAllTimers();
    STATE.inductionPhase = 'idle';
    // Restore CAP to active appearance (will be re-dimmed if glucose re-selected)
    const cap = document.getElementById('cap-protein');
    if (cap) { cap.style.transition = 'opacity 0.8s ease'; cap.style.opacity = '1'; }

    // Cancel all Web Animations
    [DNA.repressor, ...DNA.repressor.querySelectorAll('*')].forEach(el => {
      el.getAnimations().forEach(a => a.cancel());
    });
    PARTICLE_CONFIGS.forEach(cfg => {
      const el = document.getElementById(cfg.id);
      if (el) el.getAnimations().forEach(a => a.cancel());
    });

    // Reset repressor position/opacity inline (since animation is cancelled)
    DNA.repressor.style.transform = '';
    DNA.repressor.style.opacity = '';
    DNA.repressor.classList.remove('detached', 'allolactose-bound');
    DNA.repressor.classList.add('attached');

    setOperatorBlocked();
    setPolymeraseBlocked();
    DNA.allolactoseLayer.innerHTML = '';
  }

  // ═══════════════════════════════════════════════════════════
  // LACTOSE INDUCTION SEQUENCE — 5 phased steps
  // ═══════════════════════════════════════════════════════════

  function runRepressorRebind() {
    clearAllTimers();
    STATE.inductionPhase = 'idle';

    // Remove any lingering allolactose
    fadeAlloParticles(0);
    setPolymeraseBlocked();
    setOperatorBlocked();

    showNarrative('repressor rebinding to operator…', false);

    // Animate repressor back down
    bindRepressor(() => {
      showNarrative('operator blocked · transcription inhibited', false);
    });
  }

  // ═══════════════════════════════════════════════════════════
  // LACTOSE IMPORT ANIMATION SYSTEM
  // Three LacY channels transport lactose from outside → inside.
  // Each particle follows a waypoint path:
  //   [outside membrane] → [channel entry] → [channel pore] → [channel exit] → [cytoplasm drift]
  // Channels (SVG coords, viewBox 0 0 300 160):
  //   A: top,    pore center x=116, outside y=46, inside y=67
  //   B: bottom, pore center x=156, outside y=114, inside y=93
  //   C: top,    pore center x=193, outside y=46, inside y=67
  // ═══════════════════════════════════════════════════════════

  const LAC_IMPORT = {
    active: false,
    rafId: null,
    timers: [],       // spawn loop setTimeout IDs
    particles: [],    // [{el, state, t, dur, waypoints, cx, cy, opacity}]
  };

  // Channel definitions — each queue spawns particles independently
  const LAC_CHANNELS = [
    {
      id: 'A',
      // Waypoints: outside → pore top → pore mid → pore bottom → cytoplasm
      waypoints: [
        { x: 113, y: 44  },   // 0: floating outside (above top membrane)
        { x: 116, y: 52  },   // 1: channel entry (outer leaflet)
        { x: 116, y: 57  },   // 2: mid-pore
        { x: 116, y: 62  },   // 3: channel exit (inner leaflet)
        { x: 112, y: 70  },   // 4: cytoplasm drift
        { x: 108, y: 76  },   // 5: deeper cytoplasm (fade here)
      ],
      spawnOffset: 0,     // stagger spawn across channels
    },
    {
      id: 'B',
      // Bottom channel — particles come from below
      waypoints: [
        { x: 153, y: 116 },   // 0: floating outside (below bottom membrane)
        { x: 156, y: 108 },   // 1: channel entry (outer leaflet, bottom)
        { x: 156, y: 103 },   // 2: mid-pore
        { x: 156, y: 98  },   // 3: channel exit (inner leaflet, bottom)
        { x: 160, y: 90  },   // 4: cytoplasm drift
        { x: 163, y: 84  },   // 5: deeper cytoplasm
      ],
      spawnOffset: 1400,
    },
    {
      id: 'C',
      waypoints: [
        { x: 196, y: 44  },
        { x: 193, y: 52  },
        { x: 193, y: 57  },

  // Draw one lactose molecule: disaccharide hint — two fused hexagon-ish blobs
  function createLacMolecule() {

  // Lerp between two waypoints
  function lerpWP(wps, progress) {
    const segments = wps.length - 1;
    const scaled = progress * segments;
    const i = Math.min(Math.floor(scaled), segments - 1);
    const local = scaled - i;
    const e = ease(local);
    return {
      x: wps[i].x + (wps[i + 1].x - wps[i].x) * e,
      y: wps[i].y + (wps[i + 1].y - wps[i].y) * e,
    };
  }

  function spawnLacParticle(channel) {
    const layer = document.getElementById('lactoseImportLayer');
    if (!layer || !LAC_IMPORT.active) return;

    const mol = createLacMolecule();
    mol.setAttribute('transform', `translate(${channel.waypoints[0].x}, ${channel.waypoints[0].y})`);
    mol.style.opacity = '0';
    layer.appendChild(mol);

    // Randomise duration slightly per particle for organic feel
    const dur = randSpd(3200, 900);  // 3.2–4.1 s

    const particle = {
      el: mol,
      waypoints: channel.waypoints,
      t: 0,
      dur,
      startTime: null,
      channel,
    };
    LAC_IMPORT.particles.push(particle);
  }

  // Per-channel spawn loop — each channel spawns one particle at a time,
  // waits for it to complete, then waits a short gap before next
  function scheduleChannelLoop(channel, delayMs) {
    if (!LAC_IMPORT.active) return;
    const tid = setTimeout(() => {
      if (!LAC_IMPORT.active) return;
      spawnLacParticle(channel);
      const dur = randSpd(3600, 800);
      const gap = randSpd(600, 400);
      scheduleChannelLoop(channel, dur + gap);
    }, delayMs);
    LAC_IMPORT.timers.push(tid);
  }

  function tickLacImport(now) {
    if (!LAC_IMPORT.active) return;

    const alive = [];
    for (const p of LAC_IMPORT.particles) {
      if (!p.startTime) p.startTime = now;
      const elapsed = now - p.startTime;
      const raw = Math.min(elapsed / p.dur, 1);
      const pos = lerpWP(p.waypoints, raw);

      p.el.setAttribute('transform', `translate(${pos.x.toFixed(2)}, ${pos.y.toFixed(2)})`);

      // Opacity: fade in first 8%, full through mid-pore, fade out last 20%
      let op;
      if (raw < 0.08)      op = raw / 0.08;
      else if (raw < 0.80) op = 1;
      else                 op = 1 - (raw - 0.80) / 0.20;

      // Squeeze opacity while inside pore (waypoints 1–3 = ~17%–50% of path)
      if (raw > 0.17 && raw < 0.50) op *= 0.65;

      p.el.style.opacity = op.toFixed(3);

      if (raw < 1) {
        alive.push(p);
      } else {
        p.el.remove();
      }
    }
    LAC_IMPORT.particles = alive;
    LAC_IMPORT.rafId = requestAnimationFrame(tickLacImport);
  }

  function startLacImport() {
    if (LAC_IMPORT.active) return;
    LAC_IMPORT.active = true;
    LAC_IMPORT.timers = [];
    LAC_IMPORT.particles = [];
    showNarrative('Permease increases membrane permeability', true);
    LAC_CHANNELS.forEach(ch => scheduleChannelLoop(ch, ch.spawnOffset));
    LAC_IMPORT.rafId = requestAnimationFrame(tickLacImport);
  }

  function stopLacImport() {
    LAC_IMPORT.active = false;
    if (LAC_IMPORT.rafId) { cancelAnimationFrame(LAC_IMPORT.rafId); LAC_IMPORT.rafId = null; }
    LAC_IMPORT.timers.forEach(id => clearTimeout(id));
    LAC_IMPORT.timers = [];
    // Fade out all particles
    LAC_IMPORT.particles.forEach(p => {
      p.el.style.transition = 'opacity 0.4s ease';
      p.el.style.opacity = '0';
      setTimeout(() => { try { p.el.remove(); } catch(_) {} }, 450);
    });
    LAC_IMPORT.particles = [];
  }

  // ═══════════════════════════════════════════════════════════

  // Sequence (triggered ~2s after lactose import starts):
  //   1. Turbine rotor begins slow spin (CSS transform via rAF)

  //   5. Allolactose drifts toward repressor (x≈92, y≈75)

  const BGAL = {

  // Create a small disaccharide SVG (reuse lac molecule shape, purple)
  function makeLacDot(color1, color2, bondColor) {

  // Spin the rotor — called every rAF while BGAL.active
  function tickBgalRotor(now) {
    if (!BGAL.active) return;
    BGAL.rotAngle = (BGAL.rotAngle + 0.25) % 360;  // ~15 deg/sec at 60fps
    const rotor = document.getElementById('betagal-rotor');
    if (rotor) rotor.setAttribute('transform', `rotate(${BGAL.rotAngle.toFixed(1)})`);
    BGAL.rafId = requestAnimationFrame(tickBgalRotor);
  }

  // Animate one molecule along a path using rAF; calls onDone when complete
  function animateMolPath(el, waypoints, durationMs, opacityFn, onDone) {
    const layer = document.getElementById('betagalInteractionLayer');
    if (!layer) { onDone && onDone(); return; }
    layer.appendChild(el);
    el.style.opacity = '0';

    let startTime = null;
    function step(now) {
      if (!BGAL.active) { try { el.remove(); } catch(_){} onDone && onDone(); return; }
      if (!startTime) startTime = now;
      const raw = Math.min((now - startTime) / durationMs, 1);
      const t   = ease(raw);
      // lerp through waypoints — use linear local interpolation (outer ease is enough)
      const segs = waypoints.length - 1;
      const sc   = t * segs;
      const i    = Math.min(Math.floor(sc), segs - 1);
      const loc  = sc - i;
      const px   = waypoints[i].x + (waypoints[i+1].x - waypoints[i].x) * loc;
      const py   = waypoints[i].y + (waypoints[i+1].y - waypoints[i].y) * loc;
      el.setAttribute('transform', `translate(${px.toFixed(2)}, ${py.toFixed(2)})`);
      el.style.opacity = (opacityFn ? opacityFn(raw) : 1).toFixed(3);
      if (raw < 1) {
        requestAnimationFrame(step);
      } else {
        try { el.remove(); } catch(_){}
        onDone && onDone();
      }
    }
    requestAnimationFrame(step);
  }

  // ═══════════════════════════════════════════════════════════
  // triggerLacIInduction — runs when allolactose arrives at LacI
  // Sequence:
  //   1. Flash allolactose arrival at repressor
  //   2. LacI conformational change (subunits splay)
  //   3. Narrative: "Repressor released"
  //   4. Repressor drifts off operator
  //   5. Operator glow switches to free
  //   6. RNA polymerase activates → transcription begins
  // ═══════════════════════════════════════════════════════════
  function triggerLacIInduction(onComplete) {
    if (STATE.inductionPhase !== 'idle') { onComplete && onComplete(); return; }
    STATE.inductionPhase = 'bound';

    const layer = document.getElementById('betagalInteractionLayer');

    // Step 1 — brief allolactose binding flash at repressor site
    showNarrative('allolactose binds LacI → repressor changes shape', true);

    // Draw a small green flash ring around the repressor (x=92, y=75)
    const ring = document.createElementNS(SVG_NS, 'circle');
    ring.setAttribute('cx', '92'); ring.setAttribute('cy', '75'); ring.setAttribute('r', '8');
    ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', '#44ffaa');
    ring.setAttribute('stroke-width', '1.2');
    ring.setAttribute('stroke-opacity', '0.85');
    ring.style.opacity = '0';
    // append to betagalInteractionLayer so it cleans up with the system
    if (layer) layer.appendChild(ring);

    // Fade ring in then out
    ring.style.transition = 'opacity 0.3s ease';
    setTimeout(() => { ring.style.opacity = '1'; }, 20);
    setTimeout(() => {
      ring.style.transition = 'opacity 0.8s ease';
      ring.style.opacity = '0';
      setTimeout(() => { try { ring.remove(); } catch(_){} }, spd(900));
    }, 400);

    // Step 2 (t=350ms) — conformational change on repressor
    setTimeout(() => {
      if (STATE.condition !== 'lactose') { onComplete && onComplete(); return; }
      // narrative combined above
      morphRepressorBound();   // existing function — subunits splay
    }, spd(350));

    // Step 3 (t=1100ms) — narrative + release
    setTimeout(() => {
      if (STATE.condition !== 'lactose') { onComplete && onComplete(); return; }
      STATE.inductionPhase = 'releasing';
      showNarrative('Repressor released · operator unblocked', true);

      releaseRepressor(() => {          // existing function — drifts upward
        STATE.inductionPhase = 'free';

        // Step 4 — operator free glow
        setOperatorFree();

        // Step 5 (t+300ms) — polymerase activates → transcription
        setTimeout(() => {
          if (STATE.condition !== 'lactose') { onComplete && onComplete(); return; }
          showNarrative('operator free → RNAP initiates transcription', true);
          setPolymeraseActive();
          updatePhaseNavState();   // enable Phase 2 arrow now that transcription is active
          onComplete && onComplete();
        }, spd(300));
      });
    }, spd(1100));
  }

  // One full β-gal interaction cycle
  function runBgalCycle() {
    if (!BGAL.active) return;

    // — Stage 1: lactose molecule drifts from nearby cytoplasm → enzyme hub —
    // Start point: random offset inside cytoplasm a bit right of enzyme
    const startX = BGAL_POS.x + 16 + Math.random() * 8;
    const startY = BGAL_POS.y - 6 + Math.random() * 12;
    const lacMol = makeLacDot('#c880ff', '#b060f0', '#e0aaff');
    const lacWP = [
      { x: startX,        y: startY },
      { x: BGAL_POS.x + 4, y: BGAL_POS.y + 2 },
      { x: BGAL_POS.x,     y: BGAL_POS.y },   // enzyme center
    ];
    // merged into bgal reaction narrative below

    animateMolPath(lacMol, lacWP, spd(1800),
      raw => raw < 0.1 ? raw/0.1 : raw > 0.85 ? 1-(raw-0.85)/0.15 : 1,
      () => {
        if (!BGAL.active) return;
        // — Stage 2: hub flash (conformational change) —
        showNarrative('lactose → β-gal → glucose + galactose + allolactose', true);
        const hub = document.querySelector('#betagal circle:nth-child(6)');
        const hubOrig = hub ? hub.getAttribute('fill-opacity') : null;
        if (hub) {
          hub.setAttribute('fill-opacity', '1');
          hub.setAttribute('fill', '#ffffff');
        }
        // Rotor briefly spins faster — bump angle 30deg in 200ms
        let flashStart = null;
        function flashTick(now) {
          if (!flashStart) flashStart = now;
          const ft = Math.min((now - flashStart) / 200, 1);
          BGAL.rotAngle = (BGAL.rotAngle + 1.2) % 360;
          const rotor = document.getElementById('betagal-rotor');
          if (rotor) rotor.setAttribute('transform', `rotate(${BGAL.rotAngle.toFixed(1)})`);
          if (ft < 1) requestAnimationFrame(flashTick);
          else {
            // restore hub
            if (hub && hubOrig) {
              hub.setAttribute('fill-opacity', hubOrig);
              hub.setAttribute('fill', '#9966dd');
            }
            if (!BGAL.active) return;

            // — Stage 3a: glucose exits → drifts toward glycolysis, ATP spark —
            // Glucose = yellow-green single blob (monosaccharide, smaller than disaccharide)
            const glucoseMol = (function() {
              const g = document.createElementNS(SVG_NS, 'g');
              // halo
              const h = document.createElementNS(SVG_NS, 'circle');
              h.setAttribute('r', '3.2'); h.setAttribute('fill', '#aaff44');
              h.setAttribute('fill-opacity', '0.12'); g.appendChild(h);
              // body — hexose ring hint: slightly irregular ellipse
              const b = document.createElementNS(SVG_NS, 'ellipse');
              b.setAttribute('cx','0'); b.setAttribute('cy','0');
              b.setAttribute('rx','2.2'); b.setAttribute('ry','1.9');
              b.setAttribute('fill','#99ee33'); b.setAttribute('fill-opacity','0.90');
              b.setAttribute('stroke','#ccff66'); b.setAttribute('stroke-width','0.35');
              b.setAttribute('stroke-opacity','0.75'); g.appendChild(b);
              // C6 carbon hint — tiny dot
              const c = document.createElementNS(SVG_NS, 'circle');
              c.setAttribute('cx','1.4'); c.setAttribute('cy','-0.8');
              c.setAttribute('r','0.55'); c.setAttribute('fill','#eeff99');
              c.setAttribute('fill-opacity','0.80'); g.appendChild(c);
              return g;
            })();

            // Galactose — same shape, slightly warmer (epimer at C4)
            const galMol = (function() {
              const g = document.createElementNS(SVG_NS, 'g');
              const h = document.createElementNS(SVG_NS, 'circle');
              h.setAttribute('r', '3.0'); h.setAttribute('fill', '#ffcc44');
              h.setAttribute('fill-opacity', '0.10'); g.appendChild(h);
              const b = document.createElementNS(SVG_NS, 'ellipse');
              b.setAttribute('cx','0'); b.setAttribute('cy','0');
              b.setAttribute('rx','2.0'); b.setAttribute('ry','1.8');
              b.setAttribute('fill','#ffbb33'); b.setAttribute('fill-opacity','0.88');
              b.setAttribute('stroke','#ffdd88'); b.setAttribute('stroke-width','0.35');
              b.setAttribute('stroke-opacity','0.70'); g.appendChild(b);
              const c = document.createElementNS(SVG_NS, 'circle');
              c.setAttribute('cx','-1.2'); c.setAttribute('cy','0.7');
              c.setAttribute('r','0.50'); c.setAttribute('fill','#ffeeaa');
              c.setAttribute('fill-opacity','0.75'); g.appendChild(c);
              return g;
            })();

            // Glucose waypoints: exits enzyme → drifts down-right into cytoplasm
            const glucWP = [
              { x: BGAL_POS.x,      y: BGAL_POS.y },
              { x: BGAL_POS.x + 10, y: BGAL_POS.y + 8  },
              { x: BGAL_POS.x + 22, y: BGAL_POS.y + 14 },
            ];
            // Galactose exits opposite direction — up-right
            const galWP = [
              { x: BGAL_POS.x,      y: BGAL_POS.y },
              { x: BGAL_POS.x + 8,  y: BGAL_POS.y - 10 },
              { x: BGAL_POS.x + 18, y: BGAL_POS.y - 16 },
            ];

            // Animate glucose — on arrival spawn ATP label spark
            animateMolPath(glucoseMol, glucWP, spd(1600),
              raw => raw < 0.10 ? raw/0.10 : raw > 0.72 ? 1-(raw-0.72)/0.28 : 1,
              () => {
                if (!BGAL.active) return;
                // ATP spark — tiny text label that flashes and fades at glucose endpoint
                const atpLayer = document.getElementById('betagalInteractionLayer');
                if (atpLayer) {
                  const atpG = document.createElementNS(SVG_NS, 'g');
                  atpG.setAttribute('transform',
                    `translate(${(BGAL_POS.x+22).toFixed(0)}, ${(BGAL_POS.y+14).toFixed(0)})`);
                  // glow ring
                  const ring = document.createElementNS(SVG_NS, 'circle');
                  ring.setAttribute('r','5'); ring.setAttribute('fill','#aaff44');

                  txt.setAttribute('font-family',"'Courier New',monospace");
                  txt.setAttribute('font-weight','bold'); txt.setAttribute('letter-spacing','0.3');

                  atpG.appendChild(txt);
                  // lightning bolt hint — two short lines

                  bolt.setAttribute('d','M 1.5,-3.5 L -0.5,-1 L 1,-1 L -1,2');

                  bolt.setAttribute('stroke-linecap','round');
                  atpG.appendChild(bolt);
                  atpLayer.appendChild(atpG);
                  atpG.style.opacity = '0';
                  atpG.style.transition = 'opacity 0.25s ease';
                  setTimeout(() => { atpG.style.opacity = '1'; }, 20);
                  setTimeout(() => {
                    atpG.style.transition = 'opacity 1.2s ease';
                    atpG.style.opacity = '0';
                    setTimeout(() => { try { atpG.remove(); } catch(_){} }, spd(1300));
                  }, spd(900));
                }
              }
            );

            // Animate galactose in parallel — shorter fade, no ATP
            animateMolPath(galMol, galWP, spd(1400),
              raw => raw < 0.10 ? raw/0.10 : raw > 0.68 ? 1-(raw-0.68)/0.32 : 1,
              null
            );

            // — Stage 3b: allolactose (green) exits → moves toward repressor —
            const alloMol = makeLacDot('#22ee77', '#44eeaa', '#aaffcc');
            const alloWP = [
              { x: BGAL_POS.x,          y: BGAL_POS.y },
              { x: BGAL_POS.x - 20,     y: BGAL_POS.y - 4 },
              { x: (BGAL_POS.x + REPRESSOR_POS.x)/2, y: BGAL_POS.y - 3 },
              { x: REPRESSOR_POS.x + 6, y: REPRESSOR_POS.y },
            ];
            animateMolPath(alloMol, alloWP, spd(2600),
              raw => raw < 0.08 ? raw/0.08 : raw > 0.80 ? 1-(raw-0.80)/0.20 : 1,
              () => {
                if (!BGAL.active) return;
                // Allolactose has reached the repressor — trigger LacI induction
                if (STATE.inductionPhase === 'idle') {
                  triggerLacIInduction(() => {
                    // After full induction, schedule next β-gal cycle
                    BGAL.cycleTimer = setTimeout(runBgalCycle, randSpd(5000, 2000));
                  });
                } else {
                  // Induction already running or complete — just loop
                  BGAL.cycleTimer = setTimeout(runBgalCycle, randSpd(4000, 1500));
                }
              }
            );
          }
        }
        setTimeout(() => requestAnimationFrame(flashTick), spd(80));
      }
    );
  }

  function startBgalSystem() {
    if (BGAL.active) return;
    BGAL.active = true;
    BGAL.rotAngle = 0;
    // Begin slow rotor spin
    BGAL.rafId = requestAnimationFrame(tickBgalRotor);
    // First cycle fires after lactose import has a moment to establish
    BGAL.cycleTimer = setTimeout(runBgalCycle, spd(2000));

  function stopBgalSystem() {

    if (BGAL.rafId)    { cancelAnimationFrame(BGAL.rafId); BGAL.rafId = null; }

    const rotor = document.getElementById('betagal-rotor');
    if (rotor) rotor.setAttribute('transform', 'rotate(0)');

    const layer = document.getElementById('betagalInteractionLayer');
    if (layer) layer.innerHTML = '';

  // Spawn ATP spark at a cytoplasm position
  function spawnAtpSpark(x, y) {

    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);
