    // ATP label
    const txt = document.createElementNS(SVG_NS, 'text');
    txt.setAttribute('x','0'); txt.setAttribute('y','-5');
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('font-size','4.0');
    txt.setAttribute('fill','#bbff55'); txt.setAttribute('fill-opacity','0.92');
    txt.setAttribute('font-family',"'Courier New',monospace");
    txt.setAttribute('font-weight','bold'); txt.textContent = 'ATP';
    g.appendChild(txt);
    // lightning bolt
    const bolt = document.createElementNS(SVG_NS, 'path');
    bolt.setAttribute('d','M 1.5,-3.2 L -0.4,-0.8 L 0.9,-0.8 L -1,2');
    bolt.setAttribute('fill','none'); bolt.setAttribute('stroke','#ddff88');
    bolt.setAttribute('stroke-width','0.85'); bolt.setAttribute('stroke-linecap','round');
    g.appendChild(bolt);
    layer.appendChild(g);
    g.style.opacity = '0';
    g.style.transition = 'opacity 0.22s ease';
    setTimeout(() => { g.style.opacity = '1'; }, 20);
    setTimeout(() => {
      g.style.transition = 'opacity 1.1s ease'; g.style.opacity = '0';
      setTimeout(() => { try { g.remove(); } catch(_){} }, spd(1200));
    }, 850);
  }

  function tickGlucImport(now) {
    if (!GLUC.active) return;
    const alive = [];
    for (const p of GLUC.particles) {
      if (!p.startTime) p.startTime = now;
      const raw = Math.min((now - p.startTime) / p.dur, 1);
      const segs = p.waypoints.length - 1;
      const sc = ease(raw) * segs;
      const i  = Math.min(Math.floor(sc), segs - 1);
      const lo = sc - i;
      const px = p.waypoints[i].x + (p.waypoints[i+1].x - p.waypoints[i].x) * lo;
      const py = p.waypoints[i].y + (p.waypoints[i+1].y - p.waypoints[i].y) * lo;
      p.el.setAttribute('transform', `translate(${px.toFixed(2)},${py.toFixed(2)})`);
      // opacity: fade in fast, full through membrane, fade out at cytoplasm
      let op = raw < 0.08 ? raw/0.08 : raw > 0.78 ? 1-(raw-0.78)/0.22 : 1;
      if (raw > 0.28 && raw < 0.52) op *= 0.55; // squeeze through membrane
      p.el.style.opacity = op.toFixed(3);
      if (raw < 1) {
        alive.push(p);
      } else {
        try { p.el.remove(); } catch(_){}
        // ATP spark at endpoint
        spawnAtpSpark(p.waypoints[p.waypoints.length-1].x,
                      p.waypoints[p.waypoints.length-1].y);
      }
    }
    GLUC.particles = alive;
    GLUC.rafId = requestAnimationFrame(tickGlucImport);
  }

  // Three entry points across the top membrane (no explicit channel — PTS is fast)
  const GLUC_ENTRIES = [
    { // left zone
      waypoints: [
        { x: 100, y: 44  },   // outside
        { x: 100, y: 52  },   // outer leaflet
        { x: 100, y: 60  },   // inner leaflet
        { x: 110, y: 74  },   // cytoplasm
        { x: 118, y: 82  },   // deeper cytoplasm
      ],
      spawnOffset: 0,
    },
    { // center
      waypoints: [
        { x: 148, y: 44  },
        { x: 148, y: 52  },
        { x: 148, y: 60  },
        { x: 152, y: 72  },
        { x: 155, y: 80  },
      ],
      spawnOffset: 900,
    },
    { // right zone
      waypoints: [
        { x: 222, y: 44  },
        { x: 222, y: 52  },
        { x: 222, y: 60  },
        { x: 218, y: 72  },
        { x: 213, y: 80  },
      ],
      spawnOffset: 1700,
    },
  ];

  function scheduleGlucLoop(entry, delayMs) {
    if (!GLUC.active) return;
    const tid = setTimeout(() => {
      if (!GLUC.active) return;
      const layer = document.getElementById('lactoseImportLayer');
      if (!layer) return;
      const el = makeGlucoseDot();
      el.style.opacity = '0';
      el.setAttribute('transform',
        `translate(${entry.waypoints[0].x},${entry.waypoints[0].y})`);
      layer.appendChild(el);
      GLUC.particles.push({
        el, waypoints: entry.waypoints,
        startTime: null,
        dur: randSpd(2800, 600),
      });
      // Next particle for this entry after current finishes + gap
      scheduleGlucLoop(entry, randSpd(3200, 700));
    }, delayMs);
    GLUC.timers.push(tid);
  }

  function startGlucoseImport() {
    if (GLUC.active) return;
    GLUC.active = true;
    GLUC.particles = [];
    GLUC_ENTRIES.forEach(e => scheduleGlucLoop(e, e.spawnOffset));
    GLUC.rafId = requestAnimationFrame(tickGlucImport);
    showNarrative('glucose entering cell · glycolysis · ATP produced', false);
  }

  function stopGlucoseImport() {
    GLUC.active = false;
    if (GLUC.rafId) { cancelAnimationFrame(GLUC.rafId); GLUC.rafId = null; }
    GLUC.timers.forEach(id => clearTimeout(id)); GLUC.timers = [];
    GLUC.particles.forEach(p => {
      p.el.style.transition = 'opacity 0.3s ease'; p.el.style.opacity = '0';
      setTimeout(() => { try { p.el.remove(); } catch(_){} }, 350);
    });
    GLUC.particles = [];
  }

  // ═══════════════════════════════════════════════════════════
  // setCondition — master state controller
  // ═══════════════════════════════════════════════════════════
  function setCondition(condition) {
    if (condition === STATE.condition && STATE.inductionPhase !== 'idle') return; // debounce same state
    const prev = STATE.condition;
    STATE.condition = condition;

    // Update control buttons
    wraps.forEach(wrap => {
      const btn = wrap.querySelector('.ctrl-btn');
      const isActive = wrap.dataset.condition === condition;
      btn.classList.toggle('active',    isActive);
      btn.classList.toggle('inactive', !isActive);
      wrap.classList.toggle('active-wrap', isActive);
    });

    // Update corner indicator
    const meta = CONDITION_META[condition];
    dotEl.style.background   = meta.dot;
    dotEl.style.boxShadow    = `0 0 6px 2px ${meta.glow}`;
    stateText.textContent    = meta.label;
    indicator.style.borderColor = `${meta.dot}33`;

    // ── State transitions ──
    switch (condition) {

      case 'static':
        stopLacImport();
        stopBgalSystem();
        stopRibosomes();
        stopGlucoseImport();
        snapToBaseline();
        showNarrative('lac operon · baseline state', false);
        break;

      case 'lactose':
        stopGlucoseImport();
        snapToBaseline();
        startLacImport();
        startBgalSystem();   // β-gal cycle → allolactose arrival → triggers induction
        break;

      case 'glucose':
        stopLacImport();
        stopBgalSystem();
        stopRibosomes();
        clearTranscription();
        snapToBaseline();   // repressor stays bound — lac operon OFF
        // CAP inactive — cAMP low when glucose is high
        (function() {
          const cap = document.getElementById('cap-protein');
          if (cap) { cap.style.transition = 'opacity 1.0s ease'; cap.style.opacity = '0.20'; }
        })();
        showNarrative('glucose present · lac operon OFF · direct glycolysis', false);
        startGlucoseImport();
        break;
    }
  }

  // ── Wire up button clicks + keyboard ──
  wraps.forEach(wrap => {
    wrap.addEventListener('click', () => {
      setCondition(wrap.dataset.condition);
      // Update phase nav immediately on condition change
      setTimeout(updatePhaseNavState, 50);
    });
    wrap.querySelector('.ctrl-btn').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setCondition(wrap.dataset.condition); }
    });
  });

  // ═══════════════════════════════════════════════════════════
  // RIBOSOME CO-TRANSLATION SYSTEM
  // Ribosomes attach to the 5' end of mRNA as it grows and
  // slide rightward along it (coupled transcription-translation).
  // Each ribosome is a small bilobed dot (large + small subunit).
  // ═══════════════════════════════════════════════════════════
  const RIB = {
    active: false,
    timers: [],
    particles: [],
    rafId: null,
  };

  function makeRibosomeDot() {
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'mrna-ribosome');
    // Large subunit (50S)
    const large = document.createElementNS(SVG_NS, 'ellipse');
    large.setAttribute('cx', '0'); large.setAttribute('cy', '-1.4');
    large.setAttribute('rx', '2.8'); large.setAttribute('ry', '2.0');
    large.setAttribute('fill', '#00e5c0'); large.setAttribute('fill-opacity', '0.82');
    large.setAttribute('stroke', '#00ffdd'); large.setAttribute('stroke-width', '0.3');
    large.setAttribute('stroke-opacity', '0.6');
    g.appendChild(large);
    // Small subunit (30S)
    const small = document.createElementNS(SVG_NS, 'ellipse');
    small.setAttribute('cx', '0'); small.setAttribute('cy', '1.2');
    small.setAttribute('rx', '2.2'); small.setAttribute('ry', '1.5');
    small.setAttribute('fill', '#00c8aa'); small.setAttribute('fill-opacity', '0.78');
    small.setAttribute('stroke', '#00ffcc'); small.setAttribute('stroke-width', '0.3');
    small.setAttribute('stroke-opacity', '0.5');
    g.appendChild(small);
    // mRNA channel line
    const chan = document.createElementNS(SVG_NS, 'line');
    chan.setAttribute('x1', '-2.5'); chan.setAttribute('y1', '0');
    chan.setAttribute('x2', '2.5'); chan.setAttribute('y2', '0');
    chan.setAttribute('stroke', '#aaffee'); chan.setAttribute('stroke-width', '0.4');
    chan.setAttribute('stroke-opacity', '0.55');
    g.appendChild(chan);
    return g;
  }

  function tickRibosomes(now) {
    if (!RIB.active) return;
    const alive = [];
    for (const r of RIB.particles) {
      if (!r.startTime) r.startTime = now;
      const elapsed = now - r.startTime;
      const raw = Math.min(elapsed / r.dur, 1);
      // Ribosome travels from mrnaStartX to currentX of polymerase
      const mStart = TX.mrnaStartX;
      const mEnd   = TX.startX + (TX.endX - TX.startX) * Math.min((now - r.txStartTime) / r.txDur, 1);
      const rPos   = mStart + (Math.max(mEnd - mStart, 0)) * raw;
      r.el.setAttribute('transform', `translate(${rPos.toFixed(1)}, ${TX.mrnaY})`);
      // Opacity: fade in, full, fade out at end
      let op = raw < 0.05 ? raw/0.05 : raw > 0.88 ? 1-(raw-0.88)/0.12 : 1;
      r.el.style.opacity = op.toFixed(3);
      if (raw < 1) { alive.push(r); }
      else { try { r.el.remove(); } catch(_){} }
    }
    RIB.particles = alive;
    RIB.rafId = requestAnimationFrame(tickRibosomes);
  }

  function spawnRibosome(txStartTime, txDur) {
    if (!RIB.active) return;
    const layer = DNA.mrnaLayer;
    if (!layer) return;
    const el = makeRibosomeDot();
    el.style.opacity = '0';
    el.setAttribute('transform', `translate(${TX.mrnaStartX}, ${TX.mrnaY})`);
    layer.appendChild(el);
    // Small delay so ribosome attaches slightly after mRNA starts emerging
    const delay = randSpd(800, 600);
    const tid = setTimeout(() => {
      if (!RIB.active) { try { el.remove(); } catch(_){} return; }
      RIB.particles.push({
        el, startTime: null,
        dur: txDur * (0.55 + Math.random() * 0.25), // ribosome traverses ~55-80% of tx time
        txStartTime, txDur,
      });
    }, delay);
    RIB.timers.push(tid);
  }

  function startRibosomes(txStartTime, txDur) {
    RIB.active = true;
    // Spawn 2-3 ribosomes staggered
    const count = 2 + Math.floor(Math.random());
    for (let i = 0; i < count; i++) {
      const tid = setTimeout(() => spawnRibosome(txStartTime + i*spd(1800), txDur),
                             i * spd(1800));
      RIB.timers.push(tid);
    }
    if (!RIB.rafId) RIB.rafId = requestAnimationFrame(tickRibosomes);
  }

  function stopRibosomes() {
    RIB.active = false;
    RIB.timers.forEach(id => clearTimeout(id)); RIB.timers = [];
    if (RIB.rafId) { cancelAnimationFrame(RIB.rafId); RIB.rafId = null; }
    RIB.particles.forEach(r => { try { r.el.remove(); } catch(_){} });
    RIB.particles = [];
  }

  // ═══════════════════════════════════════════════════════════
  // TRANSCRIPTION ANIMATION SYSTEM
  // ═══════════════════════════════════════════════════════════
  //
  // SVG viewBox: 0 0 300 160
  // Operon x-range: 64 → 236, center y = 80
  // Polymerase body center (original): cx=76, y=64 (above helix)
  // Travel path: x=76 (promoter) → x=234 (end of lacA)
  // mRNA emerges below helix at y≈92, grows rightward from operator end (~x=104)
  //
  // Strategy: one rAF loop drives both the traveller transform AND mRNA path growth.
  // The traveller is a <g> positioned via setAttribute('transform', translate(dx,0))
  // where dx is computed from the current position along the helix x-axis.

  const TX = {
    startX:  76,   // promoter center (polymerase origin)
    endX:    234,  // end of lacA
    mrnaStartX: 100, // mRNA begins emerging here (past operator)
    mrnaY:   91,   // y position of mRNA strand (below helix)
    timeoutId: null,  // Bug 4 fix: separate handle for setTimeout
    rafId:     null,  // Bug 4 fix: separate handle for rAF
    mrnaEl: null,
    rnapTraveller: null,
  };

  // Gene regions with activation labels, strong transcribe glows, and soft trailing glows
  const GENE_REGIONS = [
    { name: 'lacZ', x0: 104, x1: 157, filter: 'url(#lacZTranscribeGlow)', softFilter: 'url(#lacZSoftGlow)', label: 'lacZ transcribed' },
    { name: 'lacY', x0: 159, x1: 197, filter: 'url(#lacYTranscribeGlow)', softFilter: 'url(#lacYSoftGlow)', label: 'lacY transcribed' },
    { name: 'lacA', x0: 200, x1: 234, filter: 'url(#lacATranscribeGlow)', softFilter: null,                 label: 'lacA transcribed'       },
  ];

  function clearTranscription() {
    // Bug 4+5 fix: cancel both handles independently — no overwrite race
    if (TX.rafId)     { cancelAnimationFrame(TX.rafId); TX.rafId = null; }
    if (TX.timeoutId) { clearTimeout(TX.timeoutId);     TX.timeoutId = null; }
    if (TX.rnapTraveller) { TX.rnapTraveller.remove(); TX.rnapTraveller = null; }
    stopRibosomes();
    DNA.mrnaLayer.innerHTML = '';
    TX.mrnaEl = null;
    // Reset gene glows
    GENE_REGIONS.forEach(g => {
      const el = DNA[g.name];
      if (el) { el.style.filter = ''; el.style.transition = ''; }
    });
  }

  function buildRnapTraveller() {
    const clone = DNA.rnaPolymerase.cloneNode(true);
    clone.id = 'rnap-traveller';
    clone.removeAttribute('class');
    // Start at x=0 offset (promoter position = original position)
    clone.setAttribute('transform', 'translate(0, 0)');
    clone.style.filter = 'url(#rnapActiveGlow)';
    clone.style.opacity = '1';
    // Remove any animateTransform children that might interfere
    clone.querySelectorAll('animateTransform, animate').forEach(a => a.remove());
    DNA.transcriptionEffects.appendChild(clone);
    return clone;
  }

  function buildMrnaStrand() {
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('class', 'mrna-strand');
    path.setAttribute('d', `M ${TX.mrnaStartX},${TX.mrnaY}`);
    DNA.mrnaLayer.appendChild(path);
    return path;
  }

  function runTranscriptionLoop(totalDurationMs) {
    clearTranscription();  // Bug 5 fix: always clear before starting new loop
    TX.rnapTraveller = buildRnapTraveller();
    TX.mrnaEl = buildMrnaStrand();
    // narrative combined above

    // Bug 2 fix: Phase 0 — polymerase travels promoter(76) → operator(94) → lacZ(104)
    // before mRNA synthesis begins. Duration: 1200ms
    const PHASE0_DURATION = spd(1200);
    const PHASE0_START = TX.startX;   // 76 (promoter)
    const PHASE0_END   = 104;         // lacZ start (clears operator at ~94)

    const xStart = PHASE0_END;        // main loop starts where Phase 0 ends
    const xEnd   = TX.endX;           // 234
    const xRange = xEnd - xStart;
    let startTime = null;
    let activeGene = null;

    // ── Phase 0: promoter → operator → lacZ ──
    let phase0Start = null;
    function tickPhase0(now) {
      if (!TX.rnapTraveller) return;
      if (!phase0Start) phase0Start = now;
      const t = Math.min((now - phase0Start) / PHASE0_DURATION, 1);
      const currentX = PHASE0_START + (PHASE0_END - PHASE0_START) * t;
      TX.rnapTraveller.setAttribute('transform', `translate(${currentX - PHASE0_START}, 0)`);

      if (t < 1) {
        TX.rafId = requestAnimationFrame(tickPhase0);
      } else {
        // Phase 0 done — short pause, then begin mRNA synthesis phase
        TX.timeoutId = setTimeout(() => {
          startTime = null;
          TX.rafId = requestAnimationFrame(tick);
          // Start ribosome co-translation as soon as elongation begins
          startRibosomes(performance.now(), totalDurationMs);
        }, 300);
      }
    }

    // Track which genes have been activated this cycle (for trailing soft glows)
    const activatedGenes = new Set();

    // ── Main transcription tick ──
    function tick(now) {
      if (!TX.rnapTraveller) return;
      if (!startTime) startTime = now;

      const elapsed = now - startTime;
      const t = Math.min(elapsed / totalDurationMs, 1);
      const currentX = xStart + xRange * t;

      // Move traveller — offset from PHASE0_START so position is continuous
      TX.rnapTraveller.setAttribute('transform', `translate(${currentX - PHASE0_START}, 0)`);

      // Grow mRNA strand
      if (currentX > TX.mrnaStartX) {
        let d = `M ${TX.mrnaStartX},${TX.mrnaY}`;
        const steps = Math.floor((currentX - TX.mrnaStartX) / 1.8);
        for (let i = 1; i <= steps; i++) {
          const px = TX.mrnaStartX + i * 1.8;
          const py = TX.mrnaY + Math.sin(i * 1.2) * 1.5;
          d += ` L ${px.toFixed(1)},${py.toFixed(1)}`;
        }
        TX.mrnaEl.setAttribute('d', d);
      }

      // Sequential gene activation glow
      let inGene = null;
      for (const g of GENE_REGIONS) {
        if (currentX >= g.x0 && currentX <= g.x1) { inGene = g; break; }
      }

      if (inGene !== activeGene) {
        // Polymerase left previous gene — downgrade it to soft trailing glow
        if (activeGene) {
          const prev = DNA[activeGene.name];
          if (prev) {
            prev.style.transition = 'filter 0.5s ease';
            // Keep a soft glow if filter exists, else clear
            prev.style.filter = activeGene.softFilter || '';
          }
        }
        // Polymerase entered new gene — full activation glow + narrative
        if (inGene && !activatedGenes.has(inGene.name)) {
          activatedGenes.add(inGene.name);
          if (currentPhase === 1) showNarrative(inGene.label, true);
          const el = DNA[inGene.name];
          if (el) { el.style.transition = 'filter 0.25s ease'; el.style.filter = inGene.filter; }
        } else if (inGene) {
          // Re-entry on loop repeat — just reapply active glow, no narrative repeat
          const el = DNA[inGene.name];
          if (el) { el.style.transition = 'filter 0.25s ease'; el.style.filter = inGene.filter; }
        }
        activeGene = inGene;
      }

      if (t < 1) {
        TX.rafId = requestAnimationFrame(tick);  // Bug 4 fix: use rafId
      } else {
        TX.rafId = null;
        // On completion — clear all gene glows smoothly
        if (activeGene) {
          const el = DNA[activeGene.name];
          if (el) { el.style.transition = 'filter 0.4s ease'; el.style.filter = ''; }
          activeGene = null;
        }
        // Fade any remaining soft glows on previously activated genes
        activatedGenes.forEach(name => {
          const el = DNA[name];
          if (el) { el.style.transition = 'filter 0.8s ease'; el.style.filter = ''; }
        });
        activatedGenes.clear();
        showNarrative('mRNA — lacZ · lacY · lacA ready → proceed to Phase 2', true);
        if (TX.mrnaEl)        { TX.mrnaEl.style.transition        = 'opacity 1s ease'; TX.mrnaEl.style.opacity        = '0'; }
        if (TX.rnapTraveller) { TX.rnapTraveller.style.transition = 'opacity 0.7s ease'; TX.rnapTraveller.style.opacity = '0'; }
        TX.timeoutId = setTimeout(() => {  // Bug 4 fix: use timeoutId
          if (STATE.condition === 'lactose') {
            runTranscriptionLoop(totalDurationMs);
          }
        }, spd(1600));
      }
    }

    // Short pause at promoter, then kick off Phase 0
    TX.timeoutId = setTimeout(() => {  // Bug 4 fix: use timeoutId
      TX.rafId = requestAnimationFrame(tickPhase0);
    }, spd(800));
  }

  // ── Hook: watch rnaPolymerase class via MutationObserver ──
  (function hookTranscription() {
    const rnaP = DNA.rnaPolymerase;
    let lastClass = '';

    const observer = new MutationObserver(() => {
      // Bug 1 fix: SVG elements return SVGAnimatedString — use getAttribute
      const cls = rnaP.getAttribute('class') || '';
      if (cls === lastClass) return;
      lastClass = cls;

      if (cls.includes('active') && STATE.condition === 'lactose') {
        clearTranscription();
        TX.timeoutId = setTimeout(() => runTranscriptionLoop(spd(7000)), spd(400));
      } else if (cls.includes('blocked') || cls.includes('low-activity')) {
        clearTranscription();   // glucose keeps repressor bound — no transcription
      }
    });

    observer.observe(rnaP, { attributes: true, attributeFilter: ['class'] });
  })();


  (function refineDNA() {
    const bpGroups = document.querySelectorAll('.base-pair');
    bpGroups.forEach(bp => {
      const lines = bp.querySelectorAll('line');
      const circles = bp.querySelectorAll('circle');
      if (lines.length < 2 || circles.length < 2) return;
      const topCircle = circles[0];
      const bottomCircle = circles[1];
      const topX = parseFloat(topCircle.getAttribute('cx'));
      const topY = parseFloat(topCircle.getAttribute('cy'));
      const botX = parseFloat(bottomCircle.getAttribute('cx'));
      const botY = parseFloat(bottomCircle.getAttribute('cy'));
      const dx = botX - topX;
      const dy = botY - topY;
      const len = Math.sqrt(dx * dx + dy * dy);
      const hbondGroup = document.createElementNS(SVG_NS, 'g');
      hbondGroup.setAttribute('class', 'h-bond');
      const idx = parseInt(bp.dataset.index || '0');
      const numBonds = (idx % 3 === 0) ? 3 : 2;
      for (let i = 0; i < numBonds; i++) {
        const t = 0.35 + (i * 0.3 / Math.max(numBonds - 1, 1));
        const dot = document.createElementNS(SVG_NS, 'circle');
        dot.setAttribute('class', 'h-bond-dot');
        dot.setAttribute('cx', (topX + dx * t).toFixed(2));
        dot.setAttribute('cy', (topY + dy * t).toFixed(2));
        dot.setAttribute('r', '0.6');
        hbondGroup.appendChild(dot);
      }
      bp.appendChild(hbondGroup);
      circles[0].setAttribute('r', (parseFloat(circles[0].getAttribute('r')) * 1.15).toFixed(2));
      circles[1].setAttribute('r', (parseFloat(circles[1].getAttribute('r')) * 1.15).toFixed(2));
      const toothLen = len * 0.12;
      const perpX = -dy / len * 0.8;
      const perpY = dx / len * 0.8;
      const topTooth = document.createElementNS(SVG_NS, 'polygon');
      const t1x = topX + dx * 0.08;
      const t1y = topY + dy * 0.08;
      topTooth.setAttribute('points',
        `${topX.toFixed(1)},${topY.toFixed(1)} ` +
        `${(t1x + perpX).toFixed(1)},${(t1y + perpY).toFixed(1)} ` +
        `${(t1x - perpX).toFixed(1)},${(t1y - perpY).toFixed(1)}`);
      topTooth.setAttribute('class', 'tooth-top');
      topTooth.setAttribute('fill', circles[0].getAttribute('fill'));
      bp.insertBefore(topTooth, bp.firstChild);
      const botTooth = document.createElementNS(SVG_NS, 'polygon');
      const b1x = botX - dx * 0.08;
      const b1y = botY - dy * 0.08;
      botTooth.setAttribute('points',
        `${botX.toFixed(1)},${botY.toFixed(1)} ` +
        `${(b1x + perpX).toFixed(1)},${(b1y + perpY).toFixed(1)} ` +
        `${(b1x - perpX).toFixed(1)},${(b1y - perpY).toFixed(1)}`);
      botTooth.setAttribute('class', 'tooth-bottom');
      botTooth.setAttribute('fill', circles[1].getAttribute('fill'));
      bp.insertBefore(botTooth, bp.firstChild);
    });
  })();

  // ═══════════════════════════════════════════════════════════
  // PHASE 2 — TRANSLATION INSIDE BACTERIUM 2
  // Bacterium 2 lives in the same bact-svg below bacterium 1.
  // mRNA segments are color-coded: violet=lacZ, blue=lacY, magenta=lacA.
  // Ribosomes slide along each segment and spawn protein products.
  // ═══════════════════════════════════════════════════════════

  const P2_NS = SVG_NS;

  const P2 = {
    active:   false,
    timers:   [],
    rafIds:   [],   // tracks bact2 animation rAF IDs
  };

  // Gene segments in bact2 SVG coordinates (mRNA y=258)
  const P2_MRNA_Y = 258;
  const P2_GENES = [
    { name: 'lacZ', x0: 68,  x1: 122, color: '#aa55ff', dark: '#6622bb' },
    { name: 'lacY', x0: 124, x1: 178, color: '#5566ff', dark: '#2233aa' },
    { name: 'lacA', x0: 182, x1: 232, color: '#ee33cc', dark: '#991188' },
  ];

  // ── SVG element builder ──
  function p2El(tag, attrs) {
    const el = document.createElementNS(P2_NS, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    return el;
  }

  // ── Ribosome shape (small, fits inside bact2) ──
  function buildBact2Ribosome(color) {
    const g = p2El('g', { class: 'bact2-ribosome' });
    // 50S large subunit
    g.appendChild(p2El('ellipse', {
      cx:'0', cy:'-3.5', rx:'5.5', ry:'3.8',
      fill: color, 'fill-opacity':'0.88',
      stroke:'rgba(255,255,255,0.30)', 'stroke-width':'0.5'
    }));
    // 30S small subunit
    g.appendChild(p2El('ellipse', {
      cx:'0', cy:'3', rx:'4.2', ry:'3.0',
      fill: color, 'fill-opacity':'0.72',
      stroke:'rgba(255,255,255,0.22)', 'stroke-width':'0.4'
    }));
    // mRNA channel
    g.appendChild(p2El('line', {
      x1:'-5.5', y1:'0', x2:'5.5', y2:'0',
      stroke:'rgba(220,240,255,0.55)', 'stroke-width':'1.0'
    }));
    // Growing peptide chain
    g.appendChild(p2El('path', {
      d:'M 0,6 Q 1.5,8.5 0,11 Q -1.5,13.5 0,16',
      fill:'none', stroke: color, 'stroke-width':'0.8',
      'stroke-opacity':'0.60', 'stroke-linecap':'round'
    }));
    return g;
  }

  // ── β-galactosidase turbine for bact2 ──
  function buildBact2Turbine(cx, cy, idx) {
    const g = p2El('g', { transform:`translate(${cx},${cy})`, style:'opacity:0' });
    g.appendChild(p2El('circle', { r:'10', fill:'#6633bb', 'fill-opacity':'0.20' }));
    g.appendChild(p2El('circle', { r:'8.5', fill:'rgba(30,8,55,0.60)',
      stroke:'#bb88ff', 'stroke-width':'1.0', 'stroke-opacity':'0.90' }));
    const rotorG = p2El('g', { id:`bact2-rotor-${idx}` });
    for (let i = 0; i < 6; i++) {
      rotorG.appendChild(p2El('path', {
        d:'M -1.5,-3 L -2,-8.5 A 8.5,8.5 0 0,1 2,-8.5 L 1.5,-3 Z',
        fill: i%2===0 ? '#9944ee' : '#8833dd',
        'fill-opacity':'0.88',
        stroke:'#cc88ff','stroke-width':'0.5','stroke-opacity':'0.80',
        transform:`rotate(${i*60})`
      }));
    }
    g.appendChild(rotorG);
    g.appendChild(p2El('circle', { r:'2.8', fill:'#bb55ff', 'fill-opacity':'0.92',
      stroke:'#eeddff','stroke-width':'0.7','stroke-opacity':'0.85' }));
    g.appendChild(p2El('circle', { r:'1.0', fill:'#ffffff','fill-opacity':'0.80' }));
    const lbl = p2El('text', { x:'0', y:'14', 'text-anchor':'middle', 'font-size':'3.5',
      fill:'rgba(210,170,255,0.75)', 'font-family':"'Courier New',monospace" });
    lbl.textContent = 'β-gal';
    g.appendChild(lbl);
    return g;
  }

  // ── LacY permease for bact2 (slots into membrane-like bar) ──
  function buildBact2Permease(cx, cy) {
    const g = p2El('g', { transform:`translate(${cx},${cy})`, style:'opacity:0' });
    g.appendChild(p2El('rect', { x:'-15', y:'-4', width:'30', height:'8', rx:'2',
      fill:'#003320','fill-opacity':'0.75', stroke:'#00ffb3','stroke-width':'0.5','stroke-opacity':'0.60' }));
    g.appendChild(p2El('rect', { x:'-7', y:'-8', width:'3.5', height:'16', rx:'1.2',
      fill:'#00c890','fill-opacity':'0.88', stroke:'#00e5a0','stroke-width':'0.4' }));
    g.appendChild(p2El('rect', { x:'3.5', y:'-8', width:'3.5', height:'16', rx:'1.2',
      fill:'#00c890','fill-opacity':'0.88', stroke:'#00e5a0','stroke-width':'0.4' }));
    g.appendChild(p2El('rect', { x:'-1.8', y:'-6', width:'3.6', height:'12', rx:'0',
      fill:'#001a0e','fill-opacity':'0.65' }));
    g.appendChild(p2El('path', { d:'M -5,-8 Q 0,-13 5,-8',
      fill:'none', stroke:'#00ffb3','stroke-width':'0.9','stroke-linecap':'round' }));
    g.appendChild(p2El('path', { d:'M -5,8 Q 0,13 5,8',
      fill:'none', stroke:'#00e5a0','stroke-width':'0.7','stroke-linecap':'round' }));
    const lbl = p2El('text', { x:'0', y:'19', 'text-anchor':'middle', 'font-size':'3.5',
      fill:'rgba(0,255,179,0.72)', 'font-family':"'Courier New',monospace" });
    lbl.textContent = 'LacY';
    g.appendChild(lbl);
    return g;
  }

  // ── LacA transacetylase (thumbpin) ──
  function buildBact2Transacetylase(cx, cy) {
    const g = p2El('g', { transform:`translate(${cx},${cy})`, style:'opacity:0' });
    g.appendChild(p2El('ellipse', { cx:'0', cy:'-5', rx:'7.5', ry:'8.5',
      fill:'#cc1188','fill-opacity':'0.82', stroke:'#ff44cc','stroke-width':'0.7','stroke-opacity':'0.75' }));
    g.appendChild(p2El('circle', { cx:'0', cy:'-4', r:'3.5',
      fill:'#880055','fill-opacity':'0.75', stroke:'#ff88dd','stroke-width':'0.4','stroke-opacity':'0.60' }));
    g.appendChild(p2El('rect', { x:'-2', y:'3', width:'4', height:'9', rx:'1.5',
      fill:'#aa0066','fill-opacity':'0.82', stroke:'#ff44cc','stroke-width':'0.4' }));
    const lbl = p2El('text', { x:'0', y:'19', 'text-anchor':'middle', 'font-size':'3.5',
      fill:'rgba(255,100,220,0.72)', 'font-family':"'Courier New',monospace" });
    lbl.textContent = 'LacA';
    g.appendChild(lbl);
    return g;
  }

  // ── Red→green substrate particles for LacA ──
  function runBact2Substrates(lacAEl) {
    if (!P2.active) return;
    const m = (lacAEl.getAttribute('transform')||'').match(/translate\(([^,]+),([^)]+)\)/);
    const bx = m ? parseFloat(m[1]) : 207;
    const by = m ? parseFloat(m[2]) : 248;
    const layer = document.getElementById('bact2-substrates');
    if (!layer) return;

    function spawnSub() {
      if (!P2.active) return;
      const dot = p2El('circle', {
        cx: String(bx - 14), cy: String(by - 4),
        r:'2.8', fill:'#ff4444','fill-opacity':'0.92',
        stroke:'#ff8888','stroke-width':'0.35'
      });
      layer.appendChild(dot);
      const dur = spd(1300);
      let t0 = null;
      function step(now) {
        if (!P2.active) { try { dot.remove(); } catch(_){} return; }
        if (!t0) t0 = now;
        const t = Math.min((now - t0) / dur, 1);
        const ev = ease(t);
        if (ev < 0.38) {
          // Phase 1: red dot enters from left → reaches enzyme center
          const px = bx - 14 + (bx - (bx-14)) * (ev/0.38);
          dot.setAttribute('cx', px.toFixed(1));
          dot.setAttribute('cy', String(by - 4));
          dot.setAttribute('fill', '#ff4444');
        } else if (ev < 0.55) {
          // Phase 2: inside enzyme — color shifts red → green
          const ft = (ev - 0.38) / 0.17;
          const r = Math.round(255 - ft*187), g2 = Math.round(68 + ft*187);
          dot.setAttribute('fill', `rgb(${r},${g2},68)`);
          dot.setAttribute('cx', String(bx));
          dot.setAttribute('cy', String(by - 4));
        } else {
          // Phase 3: green dot exits upward through membrane
          const exitProgress = (ev - 0.55) / 0.45;
          const exitEv = ease(exitProgress);
          const exitX = bx + 3 * exitEv;
          const exitY = (by - 4) + (216 - (by-4)) * exitEv;
          dot.setAttribute('fill', '#44ff88');
          dot.setAttribute('cx', exitX.toFixed(1));
          dot.setAttribute('cy', exitY.toFixed(1));
        }
        // Single smooth opacity curve
        const op = t < 0.07 ? t/0.07
                 : t > 0.82 ? 1 - (t - 0.82) / 0.18
                 : (ev > 0.60 && ev < 0.80)
                   ? 0.55 + (1 - Math.abs(ev - 0.70) / 0.10) * 0.45
                 : 1;
        dot.style.opacity = Math.max(0, Math.min(1, op)).toFixed(3);
        if (t < 1) { requestAnimationFrame(step); }
        else {
          try { dot.remove(); } catch(_){}
          if (P2.active) {
            const tid = setTimeout(spawnSub, randSpd(700, 500));
            P2.timers.push(tid);
          }
        }
      }
      requestAnimationFrame(step);
    }
    spawnSub();
  }

  // ── Spawn ribosome and animate along gene segment ──
  let p2TurbineIdx = 0;
  function spawnBact2Ribosome(gene, onDone) {
    const container = document.getElementById('bact2-ribosomes');
    if (!container || !P2.active) return;
    const rib = buildBact2Ribosome(gene.color);
    rib.setAttribute('transform', `translate(${gene.x0},${P2_MRNA_Y})`);
    rib.style.opacity = '0';
    container.appendChild(rib);
    // Fade in
    requestAnimationFrame(() => requestAnimationFrame(() => {
      rib.style.transition = 'opacity 0.4s ease';
      rib.style.opacity = '1';
    }));

    const dur = spd(6000 + Math.random()*1000);
    let t0 = null;
    // Fire "X translation begins" as soon as ribosome starts moving
    const translationMsgs = {
      lacZ: 'LacZ translation begins',
      lacY: 'LacY translation begins',
      lacA: 'LacA translation begins',
    };
    const narrativeTid = setTimeout(() => {
      if (P2.active) showNarrative(translationMsgs[gene.name] || '', true, true);
    }, spd(300));  // brief delay so ribosome is visibly moving before text appears
    P2.timers.push(narrativeTid);

    function tick(now) {
      if (!P2.active) { try { rib.remove(); } catch(_){} return; }
      if (!t0) t0 = now;
      const raw = Math.min((now - t0) / dur, 1);
      const x = gene.x0 + (gene.x1 - gene.x0) * raw;  // linear
      rib.setAttribute('transform', `translate(${x.toFixed(1)},${P2_MRNA_Y})`);

      if (raw < 1) {
        const rafId = requestAnimationFrame(tick);
        P2.rafIds.push(rafId);
      } else {
        rib.style.transition = 'opacity 0.4s ease'; rib.style.opacity = '0';
        setTimeout(() => { try { rib.remove(); } catch(_){} }, 450);
        onDone && onDone();
      }
    }
    const rafId = requestAnimationFrame(tick);
    P2.rafIds.push(rafId);
  }

  // ═══════════════════════════════════════════════════════════
  // β-GAL TURBINE: lactose enters hub → splits → glucose + galactose exit
  // ═══════════════════════════════════════════════════════════
  function runBgalCleavage(turbineEl) {
    if (!P2.active || !turbineEl) return;
    // Get turbine world position from its transform
    const m = (turbineEl.getAttribute('transform')||'').match(/translate\(([^,]+),([^)]+)\)/);
    const tx = m ? parseFloat(m[1]) : 95;
    const ty = m ? parseFloat(m[2]) : 248;
    const layer = document.getElementById('bact2-products');
    if (!layer) return;

    function spawnCycle() {
      if (!P2.active) return;

      // Lactose input dot — purple disaccharide approaching from right
      const lac = p2El('g', {});
      const lacH = p2El('circle', { r:'3.2', fill:'#c880ff', 'fill-opacity':'0.12' });
      const lacA2 = p2El('ellipse', { cx:'-1.2', cy:'0', rx:'2.0', ry:'1.8',
        fill:'#c880ff','fill-opacity':'0.92', stroke:'#e0aaff','stroke-width':'0.4' });
      const lacB2 = p2El('ellipse', { cx:'1.2', cy:'0', rx:'1.8', ry:'1.6',
        fill:'#b060f0','fill-opacity':'0.88', stroke:'#e0aaff','stroke-width':'0.35' });
      const lacBond = p2El('circle', { cx:'0', cy:'0', r:'0.6',
        fill:'#e0aaff','fill-opacity':'0.95' });
      lac.appendChild(lacH); lac.appendChild(lacA2);
      lac.appendChild(lacB2); lac.appendChild(lacBond);
      lac.style.opacity = '0';
      layer.appendChild(lac);

      // Approach: from right of turbine → hub center
      const startX = tx + 22, startY = ty;
      const dur1 = spd(1400);
      let t0 = null;
      function approach(now) {
        if (!P2.active) { try { lac.remove(); } catch(_){} return; }
        if (!t0) t0 = now;
        const raw = Math.min((now - t0) / dur1, 1);
        const e = ease(raw);
        const x = startX + (tx - startX) * e;
        lac.setAttribute('transform', `translate(${x.toFixed(1)},${startY})`);
        lac.style.opacity = (raw < 0.1 ? raw/0.1 : raw > 0.85 ? 1-(raw-0.85)/0.15 : 1).toFixed(3);
        if (raw < 1) { requestAnimationFrame(approach); }
        else {
          try { lac.remove(); } catch(_){}
          // Hub flash
          const hub = turbineEl.querySelector('circle:nth-child(5)');
          if (hub) {
            hub.setAttribute('fill','#ffffff');
            hub.setAttribute('fill-opacity','1');
            setTimeout(() => {
              hub.setAttribute('fill','#bb55ff');
              hub.setAttribute('fill-opacity','0.92');
            }, spd(220));
          }
          // Glucose exits right (yellow-green)
          spawnProduct(tx, ty, tx + 24, ty - 6,  '#99ee33', '#ccff66', spd(1200));
          // Galactose exits left (amber)
          spawnProduct(tx, ty, tx - 22, ty + 5,  '#ffbb33', '#ffdd88', spd(1200));

          // Next cycle
          if (P2.active) {
            const tid = setTimeout(spawnCycle, randSpd(1800, 800));
            P2.timers.push(tid);
          }
        }
      }
      requestAnimationFrame(approach);
    }

    function spawnProduct(x0, y0, x1, y1, fill, stroke, dur) {
      const dot = p2El('circle', { cx: x0.toFixed(1), cy: y0.toFixed(1),
        r:'2.4', fill, 'fill-opacity':'0.92', stroke, 'stroke-width':'0.4' });
      dot.style.opacity = '0';
      layer.appendChild(dot);
      let t0 = null;
      function move(now) {
        if (!P2.active) { try { dot.remove(); } catch(_){} return; }
        if (!t0) t0 = now;
        const raw = Math.min((now - t0) / dur, 1);
        const e = ease(raw);
        dot.setAttribute('cx', (x0 + (x1-x0)*e).toFixed(1));
        dot.setAttribute('cy', (y0 + (y1-y0)*e).toFixed(1));
        dot.style.opacity = (raw < 0.08 ? raw/0.08 : raw > 0.72 ? 1-(raw-0.72)/0.28 : 1).toFixed(3);
        if (raw < 1) { requestAnimationFrame(move); }
        else { try { dot.remove(); } catch(_){} }
      }
      requestAnimationFrame(move);
    }

    // First cycle after short delay
    const tid = setTimeout(spawnCycle, spd(600));
    P2.timers.push(tid);
  }

  // ═══════════════════════════════════════════════════════════
  // LacY PERMEASE: protein drifts to membrane channel → channel
  // brightens → lactose particle enters through it
  // ═══════════════════════════════════════════════════════════
  function runPermeaseDocking(permeaseEl) {
    if (!P2.active || !permeaseEl) return;
    // Target: the right-side LacY channel in bact2 (x=190, y=224 — top membrane)
    // The permease drifts from its spawn pos (cx=151) toward x=190, y=224
    const targetX = 190, targetY = 231;  // center of channel in bact2 coords
    const m = (permeaseEl.getAttribute('transform')||'').match(/translate\(([^,]+),([^)]+)\)/);
    const sx = m ? parseFloat(m[1]) : 151;
    const sy = m ? parseFloat(m[2]) : 246;

    const dur = spd(2000);
    let t0 = null;
    function drift(now) {
      if (!P2.active) return;
      if (!t0) t0 = now;
      const raw = Math.min((now - t0) / dur, 1);
      const e = ease(raw);
      const x = sx + (targetX - sx) * e;
      const y = sy + (targetY - sy) * e;
      permeaseEl.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);
      if (raw < 1) { requestAnimationFrame(drift); }
      else {
        // Permease slots in — fade it slightly and brighten the channel
        permeaseEl.style.opacity = '0.70';
        // Brighten the bact2 right channel group
        const ch = document.querySelector('#bact2 g:nth-child(8)');
        if (ch) { ch.style.transition = 'opacity 0.5s ease'; ch.style.opacity = '1'; }

        // Glow ring around channel — appended to bact2 layer so it cleans up with it
        const ringLayer = document.getElementById('bact2-substrates');
        const ring = p2El('circle', { cx: String(targetX), cy: String(targetY),
          r:'7', fill:'none', stroke:'#00ffb3',
          'stroke-width':'1.0','stroke-opacity':'0.80' });
        if (ringLayer) ringLayer.appendChild(ring);
        ring.style.opacity = '0';
        ring.style.transition = 'opacity 0.3s ease';
        setTimeout(() => { ring.style.opacity = '1'; }, 20);
        setTimeout(() => {
          ring.style.transition = 'opacity 1.0s ease'; ring.style.opacity = '0';
          setTimeout(() => { try { ring.remove(); } catch(_){} }, spd(1100));
        }, 500);
        // Start lactose import loop through this channel
        const tid = setTimeout(() => runLacYImport(targetX, targetY), spd(800));
        P2.timers.push(tid);
      }
    }
    requestAnimationFrame(drift);
  }

  // Lactose particles entering through the brightened channel
  function runLacYImport(chX, chY) {
    if (!P2.active) return;
    const layer = document.getElementById('bact2-substrates');
    if (!layer) return;

    function spawnLac() {
      if (!P2.active) return;
      // Lactose appears just outside top membrane, drops into cytoplasm
      const dot = p2El('g', {});
      const h = p2El('circle', { r:'2.8', fill:'#c880ff','fill-opacity':'0.12' });
      const a = p2El('ellipse', { cx:'-1.0',cy:'0',rx:'1.7',ry:'1.5',
        fill:'#c880ff','fill-opacity':'0.90',stroke:'#e0aaff','stroke-width':'0.35' });
      const b = p2El('ellipse', { cx:'1.0',cy:'0',rx:'1.5',ry:'1.4',
        fill:'#b060f0','fill-opacity':'0.85',stroke:'#e0aaff','stroke-width':'0.30' });
      dot.appendChild(h); dot.appendChild(a); dot.appendChild(b);
      dot.setAttribute('transform', `translate(${chX},${chY - 10})`);
      dot.style.opacity = '0';
      layer.appendChild(dot);

      // Falls from outside → through channel → into cytoplasm
      const endY = chY + 16 + Math.random() * 8;
      const endX = chX + (Math.random() - 0.5) * 12;
      const dur = spd(1600);
      let t0 = null;
      function fall(now) {
        if (!P2.active) { try { dot.remove(); } catch(_){} return; }
        if (!t0) t0 = now;
        const raw = Math.min((now - t0) / dur, 1);
        const e = ease(raw);
        const x = chX + (endX - chX) * e;
        const y = (chY - 10) + (endY - (chY-10)) * e;
        dot.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);
        // Squeeze opacity through membrane
        let op = raw < 0.08 ? raw/0.08 : raw > 0.82 ? 1-(raw-0.82)/0.18 : 1;
        if (raw > 0.22 && raw < 0.42) op *= 0.45;
        dot.style.opacity = op.toFixed(3);
        if (raw < 1) { requestAnimationFrame(fall); }
        else {
          try { dot.remove(); } catch(_){}
          if (P2.active) {
            const tid = setTimeout(spawnLac, randSpd(900, 500));
            P2.timers.push(tid);
          }
        }
      }
      requestAnimationFrame(fall);
    }
    spawnLac();
  }

  // ── Spawn protein product at end of segment ──
  function spawnBact2Product(gene) {
    if (!P2.active) return;
    const container = document.getElementById('bact2-products');
    if (!container) return;

    // Product positions inside bact2 cytoplasm
    const pos = { lacZ:{cx:95,cy:248}, lacY:{cx:151,cy:246}, lacA:{cx:207,cy:248} }[gene.name];
    let el;

    if (gene.name === 'lacZ') {
      const idx = p2TurbineIdx++;
      el = buildBact2Turbine(pos.cx, pos.cy, idx);
      container.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.5s ease'; el.style.opacity = '1';
        // Spin rotor
        let angle = 0;
        function spin() {
          if (!P2.active) return;
          angle = (angle + 0.35) % 360;
          const rotor = document.getElementById(`bact2-rotor-${idx}`);
          if (rotor) rotor.setAttribute('transform', `rotate(${angle.toFixed(1)})`);
          const rafId = requestAnimationFrame(spin);
          P2.rafIds.push(rafId);
        }
        requestAnimationFrame(spin);
        showNarrative('β-Galactosidase formed', true, true);
        // Start cleavage animation after rotor spins up
        const tid = setTimeout(() => runBgalCleavage(el), spd(800));
        P2.timers.push(tid);
      }, 120);

    } else if (gene.name === 'lacY') {
      el = buildBact2Permease(pos.cx, pos.cy);
      container.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.5s ease'; el.style.opacity = '1';
        showNarrative('Permease formed', true, true);
        // Drift permease to membrane channel, then start lactose import
        const tid = setTimeout(() => runPermeaseDocking(el), spd(700));
        P2.timers.push(tid);
      }, 120);

    } else if (gene.name === 'lacA') {
      el = buildBact2Transacetylase(pos.cx, pos.cy);
      container.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.5s ease'; el.style.opacity = '1';
        showNarrative('Transacetylase formed', true, true);
        // All three proteins produced — show the closing statement after a pause
        const endTid = setTimeout(() => {
          if (P2.active) showNarrative('Lac Operon functions as a unit to utilize lactose', false, true);
        }, spd(3200));
        P2.timers.push(endTid);
        const tid = setTimeout(() => runBact2Substrates(el), spd(600));
        P2.timers.push(tid);

        // Unlock dot buttons now that all proteins are formed — staggered fade-in
        const btnOrder = ['p2-btn-bgal','p2-btn-allolac','p2-btn-lacy','p2-btn-laca'];
        btnOrder.forEach((id, i) => {
          const unlockTid = setTimeout(() => {
            if (!P2.active) return;
            const btn = document.getElementById(id);
            if (btn) btn.closest('.p2-btn-wrap')?.classList.add('unlocked');
          }, spd(1800 + i * 300));
          P2.timers.push(unlockTid);
        });
      }, 120);
    }
  }

  // ── Start Phase 2 ──
  function startPhase2() {
    if (P2.active) return;
    P2.active = true;
    p2TurbineIdx = 0;  // always reset so rotor IDs are fresh on re-entry

    // Lock dot buttons until auto-sequence completes
    ['p2-btn-bgal','p2-btn-allolac','p2-btn-lacy','p2-btn-laca'].forEach(id => {
      const wrap = document.getElementById(id);
      if (wrap) wrap.closest('.p2-btn-wrap')?.classList.remove('unlocked');
    });

    // Clear product layers
    ['bact2-ribosomes','bact2-products','bact2-substrates'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = '';
    });

    // Fade out bact1 gently
    const bact1 = document.getElementById('bact1');
    const bactSvg = BACT_SVG;
    if (bact1) { bact1.style.opacity = '0'; }

    // Simultaneously pan viewBox down to bact2 position while bact1 fades
    // bact2 body: y=222–278, center y=250. ViewBox height=168 → y_start = 250-84 = 166
    const tid0 = setTimeout(() => {
      if (!P2.active || !bactSvg) return;
      const startVB = { x:0, y:0,   w:300, h:165 };
      const endVB   = { x:0, y:166, w:300, h:168 };
      const dur = 1000;
      let t0 = null;
      function animVB(now) {
        if (!t0) t0 = now;
        const raw = Math.min((now - t0) / dur, 1);
        const e = ease(raw);
        const x = startVB.x + (endVB.x - startVB.x) * e;
        const y = startVB.y + (endVB.y - startVB.y) * e;
        const w = startVB.w + (endVB.w - startVB.w) * e;
        const h = startVB.h + (endVB.h - startVB.h) * e;
        bactSvg.setAttribute('viewBox', `${x.toFixed(1)} ${y.toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`);
        if (raw < 1) { const rid = requestAnimationFrame(animVB); P2.rafIds.push(rid); }
      }
      requestAnimationFrame(animVB);
    }, spd(200));
    P2.timers.push(tid0);

    // After pan lands (~1200ms), fade bact2 in — it's already centered, no movement
    const tidBact2 = setTimeout(() => {
      if (!P2.active) return;
      const bact2 = document.getElementById('bact2');
      if (bact2) {
        bact2.style.transition = 'opacity 1.0s ease';
        bact2.style.opacity = '1';
      }
    }, spd(1300));
    P2.timers.push(tidBact2);

    // Show mRNA after bact2 is fully visible (~2400ms)
    const tid1 = setTimeout(() => {
      const mrna = document.getElementById('bact2-mrna');
      if (mrna) { mrna.style.transition = 'opacity 0.8s ease'; mrna.style.opacity = '1'; }
      showNarrative('Ribosome reads transcribed mRNA', true, true);
    }, spd(2500));
    P2.timers.push(tid1);

    // Stagger 3 ribosomes — start after mRNA is visible
    P2_GENES.forEach((gene, i) => {
      const tid = setTimeout(() => {
        if (!P2.active) return;
        spawnBact2Ribosome(gene, () => spawnBact2Product(gene));
      }, spd(4200 + i * 3500));
      P2.timers.push(tid);
    });
  }

  // ── Stop Phase 2 ──
  function stopPhase2() {
    P2.active = false;
    P2.timers.forEach(id => clearTimeout(id)); P2.timers = [];
    P2.rafIds.forEach(id => cancelAnimationFrame(id)); P2.rafIds = [];
    clearCardTimers();  // Fix 5: cancel any in-flight card step timers

    // Re-lock dot buttons for next Phase 2 entry
    ['p2-btn-bgal','p2-btn-allolac','p2-btn-lacy','p2-btn-laca'].forEach(id => {
      const btn = document.getElementById(id);
      if (btn) btn.closest('.p2-btn-wrap')?.classList.remove('unlocked');
    });

    const bactSvgStop = BACT_SVG;
    const bact1Stop   = document.getElementById('bact1');

    // Restore bact1 immediately — don't wait for viewBox animation
    if (bact1Stop) { bact1Stop.style.transition = 'opacity 0.5s ease'; bact1Stop.style.opacity = '1'; }

    // Fade bact2 out first (0.7s), then pan viewBox back to Phase 1
    const bact2 = document.getElementById('bact2');
    if (bact2) {
      bact2.style.transition = 'opacity 0.7s ease';
      bact2.style.opacity = '0';
      setTimeout(() => { bact2.style.transition = ''; }, 800);
    }
    const mrna = document.getElementById('bact2-mrna');
    if (mrna) { mrna.style.transition = 'opacity 0.4s ease'; mrna.style.opacity = '0'; }

    // After bact2 is gone, pan viewBox back — read current VB so mid-transition exits work correctly
    setTimeout(() => {
      if (!bactSvgStop) return;
      const vbRaw = bactSvgStop.getAttribute('viewBox') || '0 0 300 165';
      const [cx, cy, cw, ch] = vbRaw.split(' ').map(parseFloat);
      const startVB = { x: cx, y: cy, w: cw, h: ch };
      const endVB   = { x: 0,  y: 0,  w: 300, h: 165 };
      const dur = 700;
      let t0 = null;
      function animVBBack(now) {
        if (!t0) t0 = now;
        const raw = Math.min((now - t0) / dur, 1);
        const e = ease(raw);
        const x = startVB.x + (endVB.x - startVB.x) * e;
        const y = startVB.y + (endVB.y - startVB.y) * e;
        const w = startVB.w + (endVB.w - startVB.w) * e;
        const h = startVB.h + (endVB.h - startVB.h) * e;
        bactSvgStop.setAttribute('viewBox', `${x.toFixed(1)} ${y.toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`);
        if (raw < 1) requestAnimationFrame(animVBBack);
        else {
          bactSvgStop.setAttribute('viewBox', '0 0 300 165');
          if (bact1Stop) bact1Stop.style.opacity = '1';
        }
      }
      requestAnimationFrame(animVBBack);
    }, 750);

    // Clear layers
    ['bact2-ribosomes','bact2-products','bact2-substrates'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = '';
    });
  }
  // ═══════════════════════════════════════════════════════════
  // PHASE 2 DOT BUTTON HANDLERS
  // Each button fires a one-shot animation in bact2.
  // Buttons briefly glow "firing" then return to normal.
  // ═══════════════════════════════════════════════════════════

  function p2Flash(btnId, wrapId, ms) {
    const btn  = document.getElementById(btnId);
    const wrap = document.getElementById(wrapId);
    if (!btn || !wrap) return;
    btn.classList.add('firing'); wrap.classList.add('firing-wrap');
    setTimeout(() => {
      btn.classList.remove('firing'); wrap.classList.remove('firing-wrap');
    }, ms || spd(1200));
  }

  // ── Dot 1: β-gal — split lactose → glucose + galactose + ATP ──
  function p2FireBgal() {
    p2Flash('p2-btn-bgal', 'p2-wrap-bgal', spd(2200));
    openCard('bgal');
    const turbine = document.querySelector('#bact2-products g[transform*="95"]');
    if (turbine) {
      runBgalCleavage(turbine);
    } else {
      // Turbine not yet spawned — do a standalone one-shot in bact2 cytoplasm
      const layer = document.getElementById('bact2-products');
      const cx = 95, cy = 248;
      // One lactose in → glucose right + galactose left
      function spawnDot(x0,y0,x1,y1,fill,stroke) {
        const d = document.createElementNS(SVG_NS,'circle');
        d.setAttribute('cx',x0); d.setAttribute('cy',y0);
        d.setAttribute('r','2.4'); d.setAttribute('fill',fill);
        d.setAttribute('fill-opacity','0.90');
        d.setAttribute('stroke',stroke); d.setAttribute('stroke-width','0.4');
        d.style.opacity='0'; layer && layer.appendChild(d);
        const dur = spd(1300); let t0=null;
        function mv(now) {
          if(!t0) t0=now;
          const raw=Math.min((now-t0)/dur,1);
          const e = ease(raw);
          d.setAttribute('cx',(x0+(x1-x0)*e).toFixed(1));
          d.style.opacity=(raw<0.08?raw/0.08:raw>0.72?1-(raw-0.72)/0.28:1).toFixed(3);
          if(raw<1) requestAnimationFrame(mv);
          else { try{d.remove()}catch(_){} }
        }
        requestAnimationFrame(mv);
      }
      // Lactose approaches from right
      const lac = document.createElementNS(SVG_NS,'circle');
      lac.setAttribute('cx',String(cx+20)); lac.setAttribute('cy',String(cy));
      lac.setAttribute('r','2.8'); lac.setAttribute('fill','#c880ff');
      lac.setAttribute('fill-opacity','0.88'); lac.style.opacity='0';
      layer && layer.appendChild(lac);
      let t0=null; const dur=spd(1000);
      function ap(now){
        if(!t0)t0=now; const raw=Math.min((now-t0)/dur,1);
        const e = ease(raw);
        lac.setAttribute('cx',(cx+20+(cx-(cx+20))*e).toFixed(1));
        lac.style.opacity=(raw<0.1?raw/0.1:raw>0.85?1-(raw-0.85)/0.15:1).toFixed(3);
        if(raw<1) requestAnimationFrame(ap);
        else {
          try{lac.remove()}catch(_){}
          spawnDot(cx,cy,cx+22,cy-7,'#99ee33','#ccff66');
          spawnDot(cx,cy,cx-20,cy+6,'#ffbb33','#ffdd88');
          // ATP spark
          spawnAtpSpark(cx+22, cy-7);
        }
      }
      requestAnimationFrame(ap);
    }
  }

  // ── Dot 2: Allolactose — transgalactosylation product → repressor ──
  function p2FireAllolac() {
    p2Flash('p2-btn-allolac', 'p2-wrap-allolac', spd(3200));
    openCard('allolac');
    const layer = document.getElementById('bact2-products');
    if (!layer) return;
    // Allolactose (green) spawns at β-gal position → arcs toward LacI region (top-left of bact2)
    const sx = 95, sy = 248;
    const ex = 80, ey = 228;  // near top-left membrane (repressor conceptual area)
    const allo = document.createElementNS(SVG_NS,'g');
    const h = document.createElementNS(SVG_NS,'circle');
    h.setAttribute('r','3.0'); h.setAttribute('fill','#22ee77'); h.setAttribute('fill-opacity','0.12');
    const a = document.createElementNS(SVG_NS,'ellipse');
    a.setAttribute('cx','-1.1'); a.setAttribute('cy','0'); a.setAttribute('rx','1.9'); a.setAttribute('ry','1.7');
    a.setAttribute('fill','#22ee77'); a.setAttribute('fill-opacity','0.92');
    a.setAttribute('stroke','#aaffcc'); a.setAttribute('stroke-width','0.4');
    const b = document.createElementNS(SVG_NS,'ellipse');
    b.setAttribute('cx','1.1'); b.setAttribute('cy','0'); b.setAttribute('rx','1.7'); b.setAttribute('ry','1.6');
    b.setAttribute('fill','#44eeaa'); b.setAttribute('fill-opacity','0.88');
    b.setAttribute('stroke','#aaffcc'); b.setAttribute('stroke-width','0.35');
    allo.appendChild(h); allo.appendChild(a); allo.appendChild(b);
    allo.setAttribute('transform',`translate(${sx},${sy})`);
    allo.style.opacity='0'; layer.appendChild(allo);
    const dur = spd(2800); let t0=null;
    function mv(now){
      if(!t0)t0=now; const raw=Math.min((now-t0)/dur,1);
      const e = ease(raw);
      // Arc path: control point curves upward
      const mx=(sx+ex)/2, my=sy-28;
      const px=((1-e)*(1-e)*sx + 2*(1-e)*e*mx + e*e*ex);
      const py=((1-e)*(1-e)*sy + 2*(1-e)*e*my + e*e*ey);
      allo.setAttribute('transform',`translate(${px.toFixed(1)},${py.toFixed(1)})`);
      allo.style.opacity=(raw<0.08?raw/0.08:raw>0.80?1-(raw-0.80)/0.20:1).toFixed(3);
      if(raw<1) requestAnimationFrame(mv);
      else { try{allo.remove()}catch(_){} }
    }
    requestAnimationFrame(mv);
  }

  // ── Dot 3: LacY — permeability burst, multiple lactose enter fast ──
  function p2FireLacy() {
    p2Flash('p2-btn-lacy', 'p2-wrap-lacy', spd(3000));
    openCard('lacy');
    const layer = document.getElementById('bact2-substrates');
    if (!layer) return;
    // Burst: 5 lactose particles enter rapidly through both channels
    const entries = [
      {chX:116, chY:231}, {chX:116, chY:231}, {chX:193, chY:231},
      {chX:193, chY:231}, {chX:116, chY:231},
    ];
    entries.forEach((ch, i) => {
      setTimeout(() => {
        if (!P2.active) return;
        const dot = document.createElementNS(SVG_NS,'circle');
        dot.setAttribute('cx',String(ch.chX)); dot.setAttribute('cy',String(ch.chY-9));
        dot.setAttribute('r','2.5'); dot.setAttribute('fill','#c880ff');
        dot.setAttribute('fill-opacity','0.90'); dot.setAttribute('stroke','#e0aaff');
        dot.setAttribute('stroke-width','0.35'); dot.style.opacity='0';
        layer.appendChild(dot);
        const endY = ch.chY + 14 + Math.random()*10;
        const endX = ch.chX + (Math.random()-0.5)*14;
        const dur = spd(1200); let t0=null;
        function fall(now){
          if(!t0)t0=now; const raw=Math.min((now-t0)/dur,1);
          const e = ease(raw);
          dot.setAttribute('cx',(ch.chX+(endX-ch.chX)*e).toFixed(1));
          dot.setAttribute('cy',(ch.chY-9+(endY-(ch.chY-9))*e).toFixed(1));
          let op=raw<0.08?raw/0.08:raw>0.80?1-(raw-0.80)/0.20:1;
          if(raw>0.20&&raw<0.40) op*=0.40;
          dot.style.opacity=op.toFixed(3);
          if(raw<1) requestAnimationFrame(fall);
          else { try{dot.remove()}catch(_){} }
        }
        requestAnimationFrame(fall);
      }, i * spd(280));
    });
  }

  // ── Dot 4: LacA — non-metabolizable sugar export ──
  function p2FireLaca() {
    p2Flash('p2-btn-laca', 'p2-wrap-laca', spd(2400));
    openCard('laca');
    const layer = document.getElementById('bact2-substrates');
    const transAcetylase = document.querySelector('#bact2-products g[transform*="207"]');
    const cx = transAcetylase
      ? parseFloat((transAcetylase.getAttribute('transform')||'').match(/translate\(([^,]+)/)?.[1]||'207')
      : 207;
    const cy = 248;
    if (!layer) return;
    // Red dot enters from left → turns green inside enzyme → exits through top membrane
    const dot = document.createElementNS(SVG_NS,'circle');
    dot.setAttribute('cx',String(cx-18)); dot.setAttribute('cy',String(cy));
    dot.setAttribute('r','2.8'); dot.setAttribute('fill','#ff4444');
    dot.setAttribute('fill-opacity','0.92'); dot.setAttribute('stroke','#ff8888');
    dot.setAttribute('stroke-width','0.35'); dot.style.opacity='0';
    layer.appendChild(dot);
    const dur = spd(2200); let t0=null;
    function move(now){
      if(!t0)t0=now; const raw=Math.min((now-t0)/dur,1);
      const e = ease(raw);
      if(e<0.40){
        // Approach enzyme — red
        dot.setAttribute('cx',(cx-18+(cx-(cx-18))*(e/0.40)).toFixed(1));
        dot.setAttribute('cy',String(cy));
        dot.setAttribute('fill','#ff4444');
      } else if(e<0.55){
        // Inside enzyme — color transition
        const ft=(e-0.40)/0.15;
        const r=Math.round(255-ft*187), g2=Math.round(68+ft*187);
        dot.setAttribute('fill',`rgb(${r},${g2},68)`);
        dot.setAttribute('cx',String(cx)); dot.setAttribute('cy',String(cy));
      } else {
        // Exit upward through membrane — green
        dot.setAttribute('fill','#44ff88');
        const exitX=cx+4, exitY=cy-((e-0.55)/0.45)*40;
        dot.setAttribute('cx',exitX.toFixed(1)); dot.setAttribute('cy',exitY.toFixed(1));
      }
      const op=raw<0.08?raw/0.08:raw>0.88?1-(raw-0.88)/0.12:1;
      dot.style.opacity=op.toFixed(3);
      if(raw<1) requestAnimationFrame(move);
      else { try{dot.remove()}catch(_){} }
    }
    requestAnimationFrame(move);
  }

    },
  };

  let cardTimers = [];

  function clearCardTimers() {
    cardTimers.forEach(id => clearTimeout(id));
    cardTimers = [];
  }

  function openCard(defKey) {
    clearCardTimers();
    const def = CARD_DEFS[defKey];
    if (!def) return;

    // Get elements fresh each time (card HTML is after script tag)
    const card        = document.getElementById('calling-card');
    const cardDot     = document.getElementById('card-dot');
    const cardTitle   = document.getElementById('card-title');
    const cardSub     = document.getElementById('card-subtitle');
    const cardSteps   = document.getElementById('card-steps');

    if (!card) return;

    // Set accent color
    card.style.setProperty('--card-accent', def.accent);


    // Header
    if (cardTitle) cardTitle.textContent = def.title;
    if (cardSub)   cardSub.textContent   = def.subtitle;

    // Rebuild steps
    if (cardSteps) {
      cardSteps.innerHTML = '';
      def.steps.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'card-step';
        li.innerHTML =
          '<div class="step-num">' + (i+1) + '</div>' +
          '<div class="step-text">' + s.text + '</div>';
        cardSteps.appendChild(li);
      });
    }



    // Show card, hide placeholder
    const ph = document.getElementById('card-placeholder');
    if (ph) ph.classList.add('hidden');
    card.classList.add('open');

    // Highlight steps sequentially
    // Enforce a minimum 600ms gap between steps so the CSS opacity glow (0.40s)
    // always finishes before the next step activates — regardless of speed setting.
    if (cardSteps) {
      const MIN_STEP_GAP = 1800; // ms — 400ms CSS transition + ~1400ms comfortable reading time
      const items = cardSteps.querySelectorAll('.card-step');
      let lastFiredAt = 0;
      def.steps.forEach((s, i) => {
        const rawDelay = spd(s.ms) + spd(200);
        const fireAt   = Math.max(rawDelay, lastFiredAt + MIN_STEP_GAP);
        lastFiredAt    = fireAt;
        const tid = setTimeout(() => {
          if (i > 0 && items[i-1]) {
            items[i-1].classList.remove('active');
            items[i-1].classList.add('done');
          }
          if (items[i]) items[i].classList.add('active');
        }, fireAt);
        cardTimers.push(tid);
      });
      const lastMs = Math.max(spd(def.steps[def.steps.length-1].ms) + spd(1600),
                              lastFiredAt + MIN_STEP_GAP);
      const tidEnd = setTimeout(() => {
        items.forEach(el => { el.classList.remove('active'); el.classList.add('done'); });
      }, lastMs);
      cardTimers.push(tidEnd);
    }
  }

  let closeCardTimer = null;
  function closeCard() {
    clearCardTimers();
    if (closeCardTimer) { clearTimeout(closeCardTimer); closeCardTimer = null; }
    const card      = document.getElementById('calling-card');
    const cardSteps = document.getElementById('card-steps');
    if (card) card.classList.remove('open');
    const ph2 = document.getElementById('card-placeholder');
    if (ph2) ph2.classList.remove('hidden');
    closeCardTimer = setTimeout(() => {
      if (cardSteps) cardSteps.querySelectorAll('.card-step')
        .forEach(el => el.classList.remove('active','done'));
      closeCardTimer = null;
    }, 500);
  }

  // Add click handlers to SVG elements — only active in Phase 1
  function setupP1ClickHandlers() {
    const svgEl = BACT_SVG;
    if (!svgEl) return;

    Object.keys(P1_INFO).forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;

      // Make element visually clickable
      el.style.cursor = 'pointer';

      el.addEventListener('click', (e) => {
        // Only respond in Phase 1
        if (currentPhase !== 1) return;
        e.stopPropagation();
        openP1Card(id);
      });
    });
  }

  function openP1Card(id) {
    const def = P1_INFO[id];
    if (!def) return;

    // Cancel any in-flight Phase 2 step timers
    clearCardTimers();

    const card        = document.getElementById('calling-card');
    const cardDot     = document.getElementById('card-dot');
    const cardTitle   = document.getElementById('card-title');
    const cardSub     = document.getElementById('card-subtitle');
    const cardSteps   = document.getElementById('card-steps');
    const ph          = document.getElementById('card-placeholder');
    if (!card) return;

    card.style.setProperty('--card-accent', def.accent);
    if (cardTitle) cardTitle.textContent = def.title;
    if (cardSub)   cardSub.textContent   = def.subtitle;

    // Single info line as one step (no sequential animation for P1)
    if (cardSteps) {
      cardSteps.innerHTML =
        '<li class="card-step active">' +
          '<div class="step-num">ℹ</div>' +
          '<div class="step-text">' + def.line + '</div>' +
        '</li>';
    }

    if (ph) ph.classList.add('hidden');
    card.classList.add('open');
  }

  // ── Phase navigation wiring ──
  const phasePrev  = document.getElementById('phase-prev');
  const phaseNext  = document.getElementById('phase-next');
  const phaseLabel = document.getElementById('phase-label');
  let currentPhase = 1;

  // ── Full reset — returns to Phase 1, static condition ──
  function doReset() {
    // 1. If in Phase 2, tear it down cleanly
    if (currentPhase === 2) {
      currentPhase = 1;
      if (phaseNext)  phaseNext.disabled  = true;
      if (phaseLabel) phaseLabel.textContent = 'Phase 1';
      document.getElementById('controls').style.display = '';
      document.getElementById('p2-controls').classList.remove('visible');
      closeCard();
      stopPhase2();
    }
    // 2. Reset zoom and speed to defaults
    speedIdx = 2; applySpeed();
    zoomIdx  = 4; applyZoom();
    // 3. Snap back to static condition — this clears all Phase 1 timers,
    //    resets inductionPhase, repositions repressor, clears particles
    setCondition('static');
    // 4. Update phase arrow state
    setTimeout(updatePhaseNavState, 50);
  }

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) resetBtn.addEventListener('click', doReset);

  function setPhase(n) {
    currentPhase = n;
    if (n === 2) {
      if (phasePrev) phasePrev.disabled = false;
      if (phaseNext) phaseNext.disabled = true;
      if (phaseLabel) phaseLabel.textContent = 'Phase 2';
      // Hide Phase 1 controls, show Phase 2 dots
      document.getElementById('controls').style.display = 'none';
      document.getElementById('p2-controls').classList.add('visible');
      startPhase2();
    } else {
      if (phasePrev) phasePrev.disabled = true;
      if (phaseNext) phaseNext.disabled = false;
      if (phaseLabel) phaseLabel.textContent = 'Phase 1';
      // Restore Phase 1 controls, hide Phase 2 dots
      document.getElementById('controls').style.display = '';
      document.getElementById('p2-controls').classList.remove('visible');
      closeCard();
      stopPhase2();
      showNarrative('lac operon · gene regulation', false);
      setTimeout(updatePhaseNavState, 50);
    }
  }

  if (phaseNext) phaseNext.addEventListener('click', () => setPhase(2));
  if (phasePrev) phasePrev.addEventListener('click', () => setPhase(1));

  // Wire Phase 2 dot buttons
  const p2BtnBgal   = document.getElementById('p2-btn-bgal');
  const p2BtnAllo   = document.getElementById('p2-btn-allolac');
  const p2BtnLacy   = document.getElementById('p2-btn-lacy');
  const p2BtnLaca   = document.getElementById('p2-btn-laca');
  if (p2BtnBgal)   p2BtnBgal.addEventListener('click',   p2FireBgal);
  if (p2BtnAllo)   p2BtnAllo.addEventListener('click',   p2FireAllolac);
  if (p2BtnLacy)   p2BtnLacy.addEventListener('click',   p2FireLacy);
  if (p2BtnLaca)   p2BtnLaca.addEventListener('click',   p2FireLaca);

  // Enable → arrow only when lactose condition is active AND transcription is running
  function updatePhaseNavState() {
    if (phaseNext) {
      const canGoP2 = currentPhase === 1 &&
                      STATE.condition === 'lactose' &&
                      STATE.inductionPhase !== 'idle' &&
                      STATE.inductionPhase !== 'particles-drifting';
      phaseNext.disabled = !canGoP2;
    }
  }
  // updatePhaseNavState is called directly after condition changes and after induction completes

  // ── Init — must run after ALL const declarations ──
  setCondition('static');
  setupP1ClickHandlers();
  updatePhaseNavState();

</script>
